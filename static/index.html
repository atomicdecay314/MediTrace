// ── Timeline / events panel ────────────────────────────────
const btnExtract = document.getElementById('btn-extract');
const eventsList = document.getElementById('events-list');
const tlCount    = document.getElementById('tl-count');

const TYPE_LABELS = {
  Diagnosis: 'Diagnosis', Medication: 'Medication', LabResult: 'Lab Result',
  Surgery: 'Surgery', Hospitalization: 'Hospitalization',
  Symptom: 'Symptom', Consultation: 'Consultation',
};

// Confidence band thresholds — adjust here to recalibrate all badges.
// high >= HIGH → green, MID <= x < HIGH → amber, < MID → red.
const CONF = { HIGH: 0.8, MID: 0.5 };

function formatEventDate(ev) {
  const vague = ev.date_confidence < 0.5;
  let label = '';
  if (ev.date_start) {
    const d = new Date(ev.date_start + 'T00:00:00');
    const opts = ev.date_precision === 'exact'
      ? { day: 'numeric', month: 'short', year: 'numeric' }
      : ev.date_precision === 'month'
        ? { month: 'short', year: 'numeric' }
        : { year: 'numeric' };
    label = d.toLocaleDateString('en-IN', opts);
    if (vague) label = '~ ' + label;
  } else if (ev.date_raw) {
    label = '~ ' + ev.date_raw;
  } else {
    label = 'Unknown date';
  }
  return { label, vague };
}

function makeConfBadge(confidence) {
  const b = document.createElement('span');
  b.className = 'conf-badge';
  if (confidence >= CONF.HIGH)      { b.classList.add('conf-high'); b.textContent = 'High'; }
  else if (confidence >= CONF.MID)  { b.classList.add('conf-mid');  b.textContent = 'Mid';  }
  else                               { b.classList.add('conf-low');  b.textContent = 'Low';  }
  return b;
}

function yearOf(ev) {
  if (ev.date_start) return new Date(ev.date_start + 'T00:00:00').getFullYear();
  return null;
}

function renderEvents(events) {
  eventsList.innerHTML = '';
  if (!events.length) {
    eventsList.innerHTML = '<div class="doc-empty">No events extracted yet.</div>';
    tlCount.textContent = '';
    return;
  }

  tlCount.textContent = `${events.length} event${events.length !== 1 ? 's' : ''}`;

  // Group by year (null → "Unknown date")
  const groups = new Map();
  for (const ev of events) {
    const yr = yearOf(ev) ?? '?';
    if (!groups.has(yr)) groups.set(yr, []);
    groups.get(yr).push(ev);
  }

  // Sort years: numeric ascending, '?' at end
  const sortedYears = [...groups.keys()].sort((a, b) => {
    if (a === '?' && b === '?') return 0;
    if (a === '?') return 1;
    if (b === '?') return -1;
    return a - b;
  });

  for (const yr of sortedYears) {
    const grp = document.createElement('div');
    grp.className = 'year-group';

    const lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = yr === '?' ? 'Date unknown' : yr;
    grp.appendChild(lbl);

    for (const ev of groups.get(yr)) {
      const card = document.createElement('div');
      card.className = 'event-card';
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `Show provenance for ${ev.description}`);
      card.addEventListener('click', () => openProvenance(ev.id, ev.description));
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openProvenance(ev.id, ev.description); }
      });

      const top = document.createElement('div');
      top.className = 'event-card-top';

      const badge = document.createElement('span');
      badge.className = `event-badge badge-${ev.event_type}`;
      badge.textContent = TYPE_LABELS[ev.event_type] ?? ev.event_type;

      const desc = document.createElement('div');
      desc.className = 'event-desc';
      desc.textContent = ev.description;

      top.appendChild(badge);
      top.appendChild(desc);
      card.appendChild(top);

      const meta = document.createElement('div');
      meta.className = 'event-meta';

      const { label, vague } = formatEventDate(ev);
      const dateEl = document.createElement('span');
      dateEl.className = 'event-date' + (vague ? ' vague' : '');
      dateEl.textContent = label;
      meta.appendChild(dateEl);

      if (ev.source_id) {
        const srcEl = document.createElement('span');
        srcEl.className = 'event-src';
        srcEl.textContent = '📄 doc';
        srcEl.title = ev.source_id;
        meta.appendChild(srcEl);
      } else {
        const srcEl = document.createElement('span');
        srcEl.className = 'event-src';
        srcEl.textContent = '💬 interview';
        meta.appendChild(srcEl);
      }

      card.appendChild(meta);
      grp.appendChild(card);
    }
    eventsList.appendChild(grp);
  }
}

async function runExtract() {
  if (!sessionId) return;
  clearReextractHint();   // dismiss the "re-extract needed" hint
  btnExtract.disabled = true;
  btnExtract.textContent = 'Extracting…';
  try {
    const r1 = await fetch(`/api/sessions/${sessionId}/events/extract`, { method: 'POST' });
    if (!r1.ok) {
      const e = await r1.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${r1.status}`);
    }
    const summary = await r1.json();

    // If we just re-extracted after a timeline was generated, the backend
    // reset status to interview_complete and cleared conflicts/canonical flags.
    // Switch back to raw view so the user sees the fresh events.
    switchView('raw');
    fusedList.innerHTML = '<div class="placeholder">Re-extracted — click Generate timeline to fuse.</div>';
    conflictsSec.innerHTML = '';
    _tlData = null;
    btnGenerate.textContent = 'Generate timeline';

    const r2 = await fetch(`/api/sessions/${sessionId}/events`);
    const events = await r2.json();
    renderEvents(events);
    showToast(`Extracted ${summary.total} event${summary.total !== 1 ? 's' : ''}`);
  } catch (err) {
    showToast(`Extraction failed: ${err.message}`, true);
  } finally {
    btnExtract.disabled = false;
    btnExtract.textContent = 'Extract events';
  }
}

async function loadEvents() {
  if (!sessionId) return;
  try {
    const r = await fetch(`/api/sessions/${sessionId}/events`);
    if (!r.ok) return;
    const events = await r.json();
    if (events.length) renderEvents(events);
  } catch (_) { /* silent */ }
}

btnExtract.addEventListener('click', runExtract);

// ── Fused timeline panel ────────────────────────────────────
const btnGenerate    = document.getElementById('btn-generate');
const btnTlToggle    = document.getElementById('btn-tl-toggle');
const tlPanelLabel   = document.getElementById('tl-panel-label');
const tlStatus       = document.getElementById('tl-status');
const viewFused      = document.getElementById('view-fused');
const viewRaw        = document.getElementById('view-raw');
const conflictsSec   = document.getElementById('conflicts-section');
const fusedList      = document.getElementById('fused-events-list');

let tlPollTimer = null;
let tlMode = 'raw';        // 'raw' | 'fused'
let _tlData = null;        // last TimelineOut response

// ── View toggle ─────────────────────────────────────────────
function switchView(mode) {
  tlMode = mode;
  if (mode === 'fused') {
    viewFused.classList.remove('hidden');
    viewRaw.classList.add('hidden');
    tlPanelLabel.textContent = 'Timeline';
    btnTlToggle.textContent = 'Raw events';
  } else {
    viewRaw.classList.remove('hidden');
    viewFused.classList.add('hidden');
    tlPanelLabel.textContent = 'Raw events';
    btnTlToggle.textContent = 'Timeline';
  }
}

btnTlToggle.addEventListener('click', () => {
  switchView(tlMode === 'fused' ? 'raw' : 'fused');
});

// ── Generate ─────────────────────────────────────────────────
async function runGenerate() {
  if (!sessionId) return;
  btnGenerate.disabled = true;
  btnGenerate.textContent = 'Generating…';
  tlStatus.textContent = '⏳';
  try {
    const r = await fetch(`/api/sessions/${sessionId}/timeline/generate`, { method: 'POST' });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.error || e.detail || `HTTP ${r.status}`);
    }
    startTlPoll();
  } catch (err) {
    showToast(err.message, true);
    btnGenerate.disabled = false;
    btnGenerate.textContent = 'Generate timeline';
    tlStatus.textContent = '';
  }
}

function startTlPoll() {
  if (tlPollTimer) return;
  tlPollTimer = setInterval(async () => {
    if (!sessionId) return;
    const r = await fetch(`/api/sessions/${sessionId}/timeline`).catch(() => null);
    if (!r?.ok) return;
    const data = await r.json();
    if (data.status === 'timeline_generated') {
      clearInterval(tlPollTimer); tlPollTimer = null;
      _tlData = data;
      renderFusedTimeline(data);
      switchView('fused');
      btnGenerate.disabled = false;
      btnGenerate.textContent = 'Regenerate';
      tlStatus.textContent = '';
      showToast(`Timeline ready — ${data.events.length} events`);
    } else if (data.status === 'failed') {
      clearInterval(tlPollTimer); tlPollTimer = null;
      showToast('Timeline generation failed.', true);
      btnGenerate.disabled = false;
      btnGenerate.textContent = 'Generate timeline';
      tlStatus.textContent = '';
    }
  }, 1500);
}

// ── Render fused timeline ────────────────────────────────────
function renderFusedTimeline(data) {
  _tlData = data;
  if (btnSummary) btnSummary.disabled = false;
  const conflictedIds = new Set(
    data.conflicts.flatMap(c => [c.event_a_id, c.event_b_id])
  );

  // Conflicts section — collapsible, default collapsed
  conflictsSec.innerHTML = '';
  if (data.conflicts.length) {
    const n = data.conflicts.length;
    const CF_KEY = 'meditrace-cf-expanded';
    const startExpanded = localStorage.getItem(CF_KEY) === '1';

    // Toggle header — <button> so Enter/Space work natively
    const hdr = document.createElement('button');
    hdr.className = 'cf-toggle-hdr';
    hdr.setAttribute('aria-expanded', startExpanded ? 'true' : 'false');

    const lbl = document.createElement('span');
    lbl.textContent = `⚠ ${n} Conflict${n > 1 ? 's' : ''}`;
    const chev = document.createElement('span');
    chev.className = 'cf-chevron';
    chev.setAttribute('aria-hidden', 'true');
    chev.textContent = '▾';
    hdr.appendChild(lbl);
    hdr.appendChild(chev);

    // Collapsible body with the actual cards
    const body = document.createElement('div');
    body.className = 'cf-cards-body' + (startExpanded ? ' open' : '');
    data.conflicts.forEach(c => body.appendChild(makeConflictCard(c, data.events)));

    hdr.addEventListener('click', () => {
      const nowExpanded = body.classList.toggle('open');
      hdr.setAttribute('aria-expanded', nowExpanded ? 'true' : 'false');
      localStorage.setItem(CF_KEY, nowExpanded ? '1' : '0');
    });

    conflictsSec.appendChild(hdr);
    conflictsSec.appendChild(body);
  }

  // Fused events by year
  fusedList.innerHTML = '';
  if (!data.events.length) {
    fusedList.innerHTML = '<div class="doc-empty">No events in timeline.</div>';
    return;
  }

  const groups = new Map();
  for (const ev of data.events) {
    const yr = ev.date_start ? new Date(ev.date_start + 'T00:00:00').getFullYear() : '?';
    if (!groups.has(yr)) groups.set(yr, []);
    groups.get(yr).push(ev);
  }
  const sortedYrs = [...groups.keys()].sort((a, b) => {
    if (a === '?' && b === '?') return 0;
    if (a === '?') return 1; if (b === '?') return -1; return a - b;
  });

  for (const yr of sortedYrs) {
    // Negation events (patient denials) are kept in evMap for conflict card
    // descriptions, but they must NOT appear as positive timeline occurrence cards.
    const positiveEvs = groups.get(yr).filter(ev => !ev.is_negation);
    if (!positiveEvs.length) continue;

    const grp = document.createElement('div');
    grp.className = 'tl-year-group';
    const lbl = document.createElement('div');
    lbl.className = 'tl-year-label';
    lbl.textContent = yr === '?' ? 'Date unknown' : yr;
    grp.appendChild(lbl);
    for (const ev of positiveEvs) {
      grp.appendChild(makeCanonicalCard(ev, conflictedIds.has(ev.id)));
    }
    fusedList.appendChild(grp);
  }
}

function makeCanonicalCard(ev, hasConflict) {
  // Timeline wrapper: dot + card side-by-side
  const wrap = document.createElement('div');
  wrap.className = 'tl-ev-wrap';

  // Dot colour driven by real confidence value
  const dot = document.createElement('div');
  dot.className = 'tl-dot' +
    (ev.confidence >= CONF.HIGH ? '' :
     ev.date_start              ? ' tl-dot-mid' : ' tl-dot-dim');
  wrap.appendChild(dot);

  // Card — clickable for provenance
  const card = document.createElement('div');
  card.className = 'tl-ev-card' + (hasConflict ? ' tl-ev-flagged' : '');
  card.setAttribute('tabindex', '0');
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', `Show provenance for ${ev.description}`);
  card.addEventListener('click', () => openProvenance(ev.id, ev.description));
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openProvenance(ev.id, ev.description); }
  });

  // Date line — monospace, amber when vague
  const { label, vague } = formatEventDate(ev);
  const dateEl = document.createElement('p');
  dateEl.className = 'tl-ev-date' + (vague ? ' vague' : '');
  dateEl.textContent = label;
  card.appendChild(dateEl);

  // Event-type badge + title
  const titleRow = document.createElement('div');
  titleRow.className = 'tl-ev-title-row';
  const badge = document.createElement('span');
  badge.className = `event-badge badge-${ev.event_type}`;
  badge.textContent = TYPE_LABELS[ev.event_type] || ev.event_type;
  const title = document.createElement('h5');
  title.className = 'tl-ev-title';
  title.textContent = ev.description;
  titleRow.appendChild(badge);
  titleRow.appendChild(title);
  if (hasConflict) {
    const flag = document.createElement('span');
    flag.className = 'event-flag'; flag.textContent = '⚠';
    flag.title = 'Conflict — see above'; titleRow.appendChild(flag);
  }
  card.appendChild(titleRow);

  // Indicators: confidence badge (read-only) + "N sources merged"
  const indicators = document.createElement('div');
  indicators.className = 'tl-ev-indicators';
  indicators.appendChild(makeConfBadge(ev.confidence));
  if (ev.cluster_size > 1) {
    const merged = document.createElement('span');
    merged.className = 'tl-ev-merged';
    // Count driven by real cluster_size from CanonicalEventOut
    merged.textContent = `${ev.cluster_size} sources merged`;
    indicators.appendChild(merged);
  }
  card.appendChild(indicators);

  // Source chips (doc vs interview, driven by real source_ids)
  const chips = document.createElement('div');
  chips.className = 'tl-ev-src-chips';
  if (ev.source_ids && ev.source_ids.length) {
    ev.source_ids.forEach(sid => {
      const c = document.createElement('span');
      c.className = 'src-chip'; c.textContent = '📄 doc'; c.title = sid;
      chips.appendChild(c);
    });
  } else {
    const c = document.createElement('span');
    c.className = 'src-chip'; c.textContent = '💬 interview';
    chips.appendChild(c);
  }
  card.appendChild(chips);

  wrap.appendChild(card);
  return wrap;
}

function makeConflictCard(conflict, allEvents) {
  // allEvents includes negation events (is_negation=true) which are needed
  // here for source labelling even though they're excluded from the timeline.
  const evMap = Object.fromEntries(allEvents.map(e => [e.id, e]));
  const evA = evMap[conflict.event_a_id];
  const evB = evMap[conflict.event_b_id];

  const card = document.createElement('div');
  card.className = 'cf-card';
  card.dataset.conflictId = conflict.id;

  // Header: conflict type + status (Action Required or Resolved)
  const hdr = document.createElement('div');
  hdr.className = 'cf-hdr';
  const typeLabel = document.createElement('span');
  typeLabel.className = 'cf-type-label';
  // Real conflict_type from backend (date_mismatch | dose_mismatch | value_mismatch | contradiction)
  typeLabel.textContent = conflict.conflict_type.replace(/_/g, ' ').toUpperCase();
  hdr.appendChild(typeLabel);
  const statusEl = document.createElement('span');
  if (conflict.resolution !== 'unresolved') {
    statusEl.className = 'cf-resolved-status';
    statusEl.textContent = `✓ ${conflict.resolution.replace(/_/g, ' ')}`;
  } else {
    statusEl.className = 'cf-action';
    statusEl.textContent = 'Action Required';
  }
  hdr.appendChild(statusEl);
  card.appendChild(hdr);

  // Full detail text from backend (includes specific values/evidence)
  const detailEl = document.createElement('p');
  detailEl.className = 'cf-detail';
  detailEl.textContent = conflict.detail;
  card.appendChild(detailEl);

  // Two-source comparison rows, driven by real event data
  const srcBox = document.createElement('div');
  srcBox.className = 'cf-sources';
  [evA, evB].forEach(ev => {
    if (!ev) return;
    const row = document.createElement('div');
    row.className = 'cf-src-row';
    // Source label derived from real source_ids (empty = interview, non-empty = document)
    const isInterview = !ev.source_ids || ev.source_ids.length === 0;
    const lbl = document.createElement('span');
    lbl.className = 'cf-src-lbl';
    lbl.textContent = isInterview ? '💬 Interview' : '📄 Record';
    // Value: truncated real description
    const val = document.createElement('span');
    val.className = 'cf-src-val' + (isInterview ? ' cf-src-val--interview' : '');
    const desc = ev.description || '(unknown)';
    val.textContent = desc.length > 58 ? desc.slice(0, 58) + '…' : desc;
    val.title = desc;
    row.appendChild(lbl); row.appendChild(val);
    srcBox.appendChild(row);
  });
  card.appendChild(srcBox);

  // Resolution actions (only when unresolved)
  if (conflict.resolution === 'unresolved') {
    const actions = document.createElement('div');
    actions.className = 'cf-resolve-actions';
    [['a_wins', 'A correct'], ['b_wins', 'B correct'], ['both_noted', 'Note both']].forEach(([val, lbl]) => {
      const btn = document.createElement('button');
      btn.className = 'conflict-resolve-btn';
      if (conflict.resolution === val) btn.classList.add('active');
      btn.textContent = lbl;
      btn.onclick = () => resolveConflict(conflict.id, val, card);
      actions.appendChild(btn);
    });
    card.appendChild(actions);
  }
  return card;
}

async function resolveConflict(conflictId, resolution, cardEl) {
  if (!sessionId) return;
  try {
    const r = await fetch(`/api/sessions/${sessionId}/conflicts/${conflictId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ resolution }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    // Re-render conflicts section
    if (_tlData) {
      const idx = _tlData.conflicts.findIndex(c => c.id === conflictId);
      if (idx >= 0) _tlData.conflicts[idx].resolution = resolution;
      renderFusedTimeline(_tlData);
    }
    showToast('Conflict resolved');
  } catch (err) {
    showToast(err.message, true);
  }
}

// Load existing timeline on session rehydrate
async function loadTimeline() {
  if (!sessionId) return;
  try {
    const r = await fetch(`/api/sessions/${sessionId}/timeline`);
    if (!r.ok) return;
    const data = await r.json();
    if (data.status === 'timeline_generated' && data.events.length) {
      _tlData = data;
      renderFusedTimeline(data);
      switchView('fused');
      btnGenerate.textContent = 'Regenerate';
    } else if (data.status === 'processing') {
      btnGenerate.disabled = true;
      btnGenerate.textContent = 'Generating…';
      tlStatus.textContent = '⏳';
      startTlPoll();
    }
  } catch (_) { /* silent */ }
}

btnGenerate.addEventListener('click', runGenerate);

// Enable generate button once we have a session
function _enableGenerate() { if (sessionId) btnGenerate.disabled = false; }

// ── Phase 7C: Clinical summary ────────────────────────────
const btnSummary     = document.getElementById('btn-summary');
const summaryModal   = document.getElementById('summary-modal');
const summaryBackdrop = document.getElementById('summary-backdrop');
const summaryClose   = document.getElementById('summary-close');
const summaryBody    = document.getElementById('summary-body');

function closeSummary() { summaryModal.classList.add('hidden'); }
summaryClose.addEventListener('click', closeSummary);
summaryBackdrop.addEventListener('click', closeSummary);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!summaryModal.classList.contains('hidden')) closeSummary();
    if (!npModal.classList.contains('hidden')) closeNewSessionModal();
    if (!ptsModal.classList.contains('hidden')) closePatientsModal();
  }
});

function renderSummary(data) {
  summaryBody.innerHTML = '';

  // Conflicts callout — top, most urgent for the clinician
  if (data.conflicts_note) {
    const box = document.createElement('div');
    box.className = 'summ-callout summ-callout-conflict';
    const hdr = document.createElement('strong');
    hdr.className = 'summ-callout-hdr';
    hdr.textContent = '⚠ Detected Conflicts';
    box.appendChild(hdr);
    const txt = document.createTextNode(data.conflicts_note);
    box.appendChild(txt);
    summaryBody.appendChild(box);
  }

  // Sections
  for (const section of (data.sections || [])) {
    const secEl = document.createElement('div');
    secEl.className = 'summ-section';

    const hdrEl = document.createElement('div');
    hdrEl.className = 'summ-section-hdr';
    hdrEl.textContent = section.heading;
    secEl.appendChild(hdrEl);

    for (const entry of (section.entries || [])) {
      const entryEl = document.createElement('div');
      entryEl.className = 'summ-entry';

      const textEl = document.createElement('p');
      textEl.className = 'summ-entry-text';
      textEl.textContent = entry.text;
      entryEl.appendChild(textEl);

      // Gather all provenance members for cited event_ids
      const citRow = document.createElement('div');
      citRow.className = 'summ-cit-row';
      const seenSnippets = new Set();
      const seenKinds = new Set();

      for (const eid of (entry.event_ids || [])) {
        const members = data.citations[eid];
        if (!members) continue;
        for (const m of members) {
          // Kind chip — deduplicate per kind per entry
          const kindKey = m.source_kind || 'interview';
          if (!seenKinds.has(kindKey)) {
            seenKinds.add(kindKey);
            citRow.appendChild(makeKindChip(m.source_kind));
          }
          if (m.source_snippet) seenSnippets.add(m.source_snippet);
        }
      }
      if (citRow.children.length) entryEl.appendChild(citRow);

      // Verbatim snippets
      for (const snippet of seenSnippets) {
        const snipEl = document.createElement('p');
        snipEl.className = 'summ-snippet';
        snipEl.textContent = '“' + snippet + '”';
        entryEl.appendChild(snipEl);
      }

      secEl.appendChild(entryEl);
    }
    summaryBody.appendChild(secEl);
  }

  // Data quality callout — bottom
  if (data.data_quality_note) {
    const box = document.createElement('div');
    box.className = 'summ-callout summ-callout-quality';
    const hdr = document.createElement('strong');
    hdr.className = 'summ-callout-hdr';
    hdr.textContent = 'Data Quality Notes';
    box.appendChild(hdr);
    box.appendChild(document.createTextNode(data.data_quality_note));
    summaryBody.appendChild(box);
  }

  // Generated-at footer
  const footer = document.createElement('p');
  footer.className = 'summ-footer';
  footer.textContent = 'Generated ' + new Date(data.generated_at).toLocaleString();
  summaryBody.appendChild(footer);
}

async function openSummary() {
  summaryBody.innerHTML = '<div class="summ-loading">Generating clinical summary…</div>';
  summaryModal.classList.remove('hidden');
  btnSummary.disabled = true;
  try {
    const r = await fetch(`/api/sessions/${sessionId}/summary`);
    if (!r.ok) {
      const errBody = await r.json().catch(() => ({}));
      const detail = errBody.detail ?? `HTTP ${r.status}`;
      // 503 = provider busy (backend already retried); show friendly message
      const isBusy = r.status === 503;
      const msg = isBusy
        ? 'The summary service is busy right now. Please try again in a moment.'
        : `Could not generate summary: ${detail}`;
      const errEl = document.createElement('div');
      errEl.className = 'summ-error';
      errEl.textContent = msg;
      const retryBtn = document.createElement('button');
      retryBtn.className = 'summ-retry-btn';
      retryBtn.textContent = 'Try again';
      retryBtn.addEventListener('click', () => openSummary());
      errEl.appendChild(retryBtn);
      summaryBody.innerHTML = '';
      summaryBody.appendChild(errEl);
      return;  // don't fall through to finally re-enable — retry btn handles it
    }
    const data = await r.json();
    renderSummary(data);
  } catch (err) {
    // Network-level failure (fetch itself threw)
    const errEl = document.createElement('div');
    errEl.className = 'summ-error';
    errEl.textContent = 'Could not reach the server. Check your connection and try again.';
    const retryBtn = document.createElement('button');
    retryBtn.className = 'summ-retry-btn';
    retryBtn.textContent = 'Try again';
    retryBtn.addEventListener('click', () => openSummary());
    errEl.appendChild(retryBtn);
    summaryBody.innerHTML = '';
    summaryBody.appendChild(errEl);
    return;
  } finally {
    // Re-enable the toolbar button (retry btn in error state handles re-fire)
    btnSummary.disabled = false;
  }
}

btnSummary.addEventListener('click', openSummary);

// ── Phase 7B: Provenance panel ────────────────────────────
const provModal    = document.getElementById('prov-modal');
const provBackdrop = document.getElementById('prov-backdrop');
const provClose    = document.getElementById('prov-close');
const provTitle    = document.getElementById('prov-title');
const provBody     = document.getElementById('prov-body');

function closeProvenance() { provModal.classList.add('hidden'); }
provClose.addEventListener('click', closeProvenance);
provBackdrop.addEventListener('click', closeProvenance);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !provModal.classList.contains('hidden')) closeProvenance();
});

// Human-readable label for source kind values
const KIND_LABELS = {
  image_handwritten: 'Handwritten Rx',
  pdf_typed:         'Typed Doc',
};

function makeKindChip(sourceKind) {
  const chip = document.createElement('span');
  chip.className = 'prov-kind-chip';
  if (!sourceKind) {
    chip.classList.add('prov-kind-interview');
    chip.textContent = '💬 Interview';
  } else {
    chip.classList.add('prov-kind-doc');
    chip.textContent = '📄 ' + (KIND_LABELS[sourceKind] ?? sourceKind);
  }
  return chip;
}

function renderProvenanceBody(members) {
  provBody.innerHTML = '';

  const subtitle = document.createElement('p');
  subtitle.className = 'prov-subtitle';
  subtitle.textContent = members.length === 1
    ? '1 source contributor'
    : `${members.length} source contributors`;
  provBody.appendChild(subtitle);

  for (const m of members) {
    const card = document.createElement('div');
    card.className = 'prov-member' + (m.is_canonical ? ' prov-canonical' : '');

    // Header: kind chip + Primary / Patient denial tags
    const hdr = document.createElement('div');
    hdr.className = 'prov-member-header';
    hdr.appendChild(makeKindChip(m.source_kind));

    if (m.is_canonical) {
      const tag = document.createElement('span');
      tag.className = 'prov-tag prov-tag-primary';
      tag.textContent = 'Primary';
      hdr.appendChild(tag);
    }
    if (m.is_negation) {
      const tag = document.createElement('span');
      tag.className = 'prov-tag prov-tag-denial';
      tag.textContent = 'Patient denial';
      hdr.appendChild(tag);
    }
    card.appendChild(hdr);

    // Event description
    const desc = document.createElement('p');
    desc.className = 'prov-member-desc';
    desc.textContent = m.description;
    card.appendChild(desc);

    // Source label (filename) — only for document sources
    if (m.source_label) {
      const lbl = document.createElement('p');
      lbl.className = 'prov-member-label';
      lbl.textContent = m.source_label;
      card.appendChild(lbl);
    }

    // Verbatim snippet or muted placeholder
    if (m.source_snippet) {
      const snip = document.createElement('p');
      snip.className = 'prov-snippet';
      // Wrap in typographic quotation marks
      snip.textContent = '“' + m.source_snippet + '”';
      card.appendChild(snip);
    } else {
      const snip = document.createElement('p');
      snip.className = 'prov-snippet-null';
      snip.textContent = 'no snippet captured';
      card.appendChild(snip);
    }

    provBody.appendChild(card);
  }
}

async function openProvenance(eventId, description) {
  // Truncate long descriptions for the modal title
  provTitle.textContent = description.length > 60
    ? description.slice(0, 60) + '…'
    : description;
  provTitle.title = description;

  provBody.innerHTML = '<div class="placeholder" style="min-height:5rem">Loading…</div>';
  provModal.classList.remove('hidden');

  try {
    const r = await fetch(`/api/sessions/${sessionId}/events/${eventId}/provenance`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail ?? `HTTP ${r.status}`);
    }
    const members = await r.json();
    renderProvenanceBody(members);
  } catch (err) {
    provBody.innerHTML = `<div class="prov-error">Could not load provenance: ${err.message}</div>`;
  }
}

// ── Theme toggle ───────────────────────────────────────────
const btnTheme = document.getElementById('btn-theme');
const ROOT     = document.documentElement;

function applyTheme(theme) {
  ROOT.setAttribute('data-theme', theme);
  localStorage.setItem('meditrace-theme', theme);
}

function initTheme() {
  const stored = localStorage.getItem('meditrace-theme');
  if (stored === 'light' || stored === 'dark') {
    applyTheme(stored);
  } else {
    // First load: respect OS preference
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(prefersDark ? 'dark' : 'light');
  }
}

btnTheme.addEventListener('click', () => {
  const current = ROOT.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

initTheme();
boot();
</script>
