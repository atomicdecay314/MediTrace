<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrace</title>
  <!-- Inter typeface — Stitch reference font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens (Stitch reference palette) ─────────────────────── */
    :root {
      --bg:              #09090b;   /* body / outer background */
      --surface:         #131315;   /* topbar, panel headers, input trays */
      --surface-card:    #18181b;   /* panel body / bento card */
      --surface-raised:  #201f22;   /* inset elements, assistant bubbles */
      --surface-high:    #2a2a2c;
      --surface-highest: #353437;   /* kbd, subtle highlights */
      --border:          #27272a;   /* standard dividers */
      --border-active:   #424754;   /* hover / focus borders */
      --text:            #e5e1e4;   /* on-surface */
      --text-muted:      #c2c6d6;   /* on-surface-variant */
      --text-subtle:     #8c909f;   /* placeholder / label */
      --primary:         #adc6ff;   /* accent blue */
      --primary-on:      #002e6a;   /* text on primary bg */
      --primary-dim:     rgba(173,198,255,.12);
      --primary-border:  rgba(173,198,255,.25);
      /* Amber — sole warning/attention colour: vague dates, conflicts, mid-confidence */
      --amber:           #fbbf24;
      --amber-dim:       rgba(251,191,36,.12);
      --amber-border:    rgba(251,191,36,.30);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Thin dark scrollbars (matching reference) ─────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    *::-webkit-scrollbar { width: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Top bar ── */
    #topbar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.25rem; height: 56px;
      background: var(--surface); color: var(--text);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #topbar h1 { font-size: 1rem; font-weight: 700; letter-spacing: -.01em; flex: 1; color: var(--primary); }
    #session-label { font-size: .72rem; color: var(--text-subtle); font-family: ui-monospace, 'JetBrains Mono', monospace; }
    #btn-new-session {
      background: var(--primary); color: var(--primary-on); border: none;
      border-radius: 20px; padding: .35rem .9rem;
      font-size: .78rem; font-weight: 700; cursor: pointer; transition: opacity .15s;
    }
    #btn-new-session:hover { opacity: .85; }
    #btn-new-session:disabled { background: var(--surface-high); color: var(--text-subtle); cursor: not-allowed; }

    /* ── Three-panel grid (reference: 1/4 · flex-1 · 1/4, outer padding+gap) ── */
    #panels {
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      flex: 1; overflow: hidden;
      background: var(--bg);
      padding: .75rem; gap: .75rem;
    }

    .panel {
      display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .panel-header {
      padding: .6rem 1rem;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      background: var(--surface); border-bottom: 1px solid var(--border);
      color: var(--text-subtle); flex-shrink: 0;
    }

    .panel-body { flex: 1; overflow-y: auto; padding: 1rem; }

    .placeholder {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text-subtle);
      font-size: .82rem; text-align: center; line-height: 1.6;
    }

    /* ── Coverage strip ── */
    #coverage-strip {
      display: flex; flex-wrap: wrap; gap: .3rem;
      padding: .5rem 1rem; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .pill {
      font-size: .62rem; font-weight: 600; letter-spacing: .05em;
      padding: .18rem .55rem; border-radius: 999px;
      text-transform: uppercase; transition: background .3s, color .3s;
    }
    .pill-uncovered { background: var(--surface-high); color: var(--text-subtle); }
    .pill-partial   { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
    .pill-covered   { background: var(--primary-dim); color: var(--primary); border: 1px solid var(--primary-border); }

    /* ── Chat messages ── */
    #chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1rem; display: flex; flex-direction: column; gap: .75rem;
      background: var(--surface-card);
    }

    .msg {
      max-width: 80%; padding: .65rem .9rem;
      border-radius: 14px; font-size: .88rem; line-height: 1.5;
      word-break: break-word;
    }
    .msg-assistant {
      align-self: flex-start;
      background: var(--surface-raised); color: var(--text);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .msg-user {
      align-self: flex-end;
      background: var(--primary-dim); color: var(--text);
      border: 1px solid var(--primary-border); border-bottom-right-radius: 4px;
    }
    .msg-system {
      align-self: center; font-size: .75rem;
      color: var(--text-subtle); font-style: italic;
    }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex; gap: .3rem; align-items: center; padding: .65rem .9rem;
    }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-subtle); animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    #chat-footer {
      border-top: 1px solid var(--border); padding: .75rem 1rem;
      display: flex; flex-direction: column; gap: .5rem;
      flex-shrink: 0; background: var(--surface);
    }
    #chat-input-row { display: flex; gap: .5rem; }
    #chat-input {
      flex: 1; resize: none;
      border: 1px solid var(--border); border-radius: 8px;
      padding: .5rem .75rem; font-size: .88rem; font-family: inherit;
      line-height: 1.4; max-height: 120px; overflow-y: auto;
      background: var(--bg); color: var(--text);
    }
    #chat-input::placeholder { color: var(--text-subtle); }
    #chat-input:focus { outline: none; border-color: var(--primary); }
    #chat-input:disabled { background: var(--surface-raised); color: var(--text-subtle); }

    #btn-send {
      background: var(--primary); color: var(--primary-on); border: none;
      border-radius: 8px; padding: .5rem .9rem;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      align-self: flex-end; transition: opacity .15s; white-space: nowrap;
    }
    #btn-send:hover:not(:disabled) { opacity: .85; }
    #btn-send:disabled { background: var(--surface-high); color: var(--text-subtle); cursor: not-allowed; }

    #btn-mic {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 8px; padding: .5rem .65rem;
      font-size: 1.05rem; cursor: pointer; align-self: flex-end;
      transition: background .15s, border-color .15s; line-height: 1;
      color: var(--text-muted);
    }
    #btn-mic:hover:not(:disabled) { background: var(--surface-high); border-color: var(--border-active); }
    #btn-mic:disabled { opacity: .35; cursor: not-allowed; }
    #btn-mic.recording {
      background: var(--amber-dim); border-color: var(--amber-border); color: var(--amber);
      animation: pulse-mic .8s ease infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251,191,36,.3); }
      50%       { box-shadow: 0 0 0 5px rgba(251,191,36,0); }
    }

    #btn-end-interview {
      background: none; border: 1px solid var(--border);
      color: var(--text-subtle); border-radius: 6px; padding: .35rem .75rem;
      font-size: .78rem; cursor: pointer; align-self: flex-start;
      transition: border-color .15s, color .15s;
    }
    #btn-end-interview:hover:not(:disabled) { border-color: var(--border-active); color: var(--text-muted); }
    #btn-end-interview:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Complete banner ── */
    #complete-banner {
      display: none; margin: .5rem 0;
      background: var(--primary-dim); border: 1px solid var(--primary-border);
      border-radius: 8px; padding: .6rem 1rem;
      font-size: .82rem; color: var(--primary); text-align: center;
    }

    /* ── Generate-timeline btn (interview footer) ── */
    #btn-generate-timeline {
      display: none; width: 100%;
      background: var(--primary); color: var(--primary-on); border: none;
      border-radius: 8px; padding: .65rem;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    #btn-generate-timeline:hover { opacity: .85; }

    /* ── Documents panel ── */
    #doc-upload-area {
      padding: .6rem .75rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #dropzone {
      border: 2px dashed var(--border-active); border-radius: 8px;
      padding: .6rem .5rem; text-align: center; cursor: pointer;
      font-size: .78rem; color: var(--text-subtle);
      transition: border-color .2s, background .2s; line-height: 1.6;
    }
    #dropzone.over { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); }
    .file-label { color: var(--primary); cursor: pointer; text-decoration: underline; }

    #doc-list { flex: 1; overflow-y: auto; padding: .5rem; }

    .doc-item {
      display: flex; align-items: center; gap: .45rem;
      padding: .45rem .55rem; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); margin-bottom: .35rem;
      transition: background .15s, border-color .15s; background: var(--surface-raised);
    }
    .doc-item:hover { background: var(--surface-high); border-color: var(--border-active); }
    .doc-name {
      flex: 1; font-size: .78rem; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; color: var(--text);
    }
    .doc-kind { font-size: .65rem; color: var(--text-subtle); flex-shrink: 0; }

    .status-chip {
      font-size: .68rem; font-weight: 700;
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chip-pending    { background: var(--surface-high); color: var(--text-subtle); animation: spin-chip 1.5s linear infinite; }
    .chip-done       { background: rgba(52,211,153,.15); color: #6ee7b7; }
    .chip-unreadable { background: var(--amber-dim); color: var(--amber); }
    .chip-error      { background: rgba(239,68,68,.15); color: #f87171; }
    @keyframes spin-chip { to { transform: rotate(360deg); } }

    .doc-reupload {
      background: none; border: none; color: var(--text-subtle);
      cursor: pointer; font-size: .85rem; padding: 0 .15rem; flex-shrink: 0;
    }
    .doc-reupload:hover { color: var(--primary); }
    .doc-empty { text-align: center; color: var(--text-subtle); font-size: .8rem; padding: 1.5rem .5rem; }

    /* ── Audit modal ── */
    .modal {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
    }
    .modal.hidden { display: none; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.65); }
    .modal-box {
      position: relative; background: var(--surface-card); border-radius: 12px;
      width: min(90vw, 680px); max-height: 82vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6); border: 1px solid var(--border);
    }
    .modal-header {
      display: flex; align-items: center; gap: .5rem;
      padding: .75rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--surface);
    }
    #audit-title {
      flex: 1; font-size: .92rem; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #audit-close {
      background: none; border: none; font-size: 1.3rem;
      cursor: pointer; color: var(--text-subtle); line-height: 1; padding: 0 .2rem;
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 1rem; }
    .audit-status-row { margin-bottom: .6rem; font-size: .82rem; color: var(--text-muted); }
    .audit-warnings {
      background: var(--amber-dim); border: 1px solid var(--amber-border); border-radius: 6px;
      padding: .5rem .75rem; margin-bottom: .7rem; font-size: .78rem; color: var(--amber);
    }
    .warn-item + .warn-item { margin-top: .2rem; }
    .audit-section-title {
      font-size: .7rem; font-weight: 700; color: var(--text-subtle);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: .3rem;
    }
    .audit-text {
      background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px;
      padding: .65rem .75rem; font-size: .76rem; font-family: ui-monospace, monospace;
      white-space: pre-wrap; word-break: break-word; color: var(--text-muted);
      max-height: 280px; overflow-y: auto; margin-bottom: .8rem;
    }
    .audit-meta {
      background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px;
      padding: .65rem .75rem; font-size: .72rem; font-family: ui-monospace, monospace;
      white-space: pre-wrap; max-height: 180px; overflow-y: auto; color: var(--text-muted);
    }

    /* ── Timeline / events panel ── */
    .panel-header-sub { font-weight: 400; opacity: .6; font-size: .75em; }

    #tl-toolbar {
      display: flex; align-items: center; gap: .45rem; flex-wrap: wrap;
      padding: .5rem .75rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--surface);
    }
    #btn-extract, #btn-generate {
      border: none; border-radius: 6px; padding: .32rem .7rem;
      font-size: .78rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    #btn-extract  { background: var(--surface-highest); color: var(--text-muted); }
    #btn-generate { background: var(--primary); color: var(--primary-on); }
    #btn-extract:hover:not(:disabled)  { background: var(--border-active); color: var(--text); }
    #btn-generate:hover:not(:disabled) { opacity: .85; }
    #btn-extract:disabled, #btn-generate:disabled { background: var(--surface-high); color: var(--text-subtle); cursor: not-allowed; }
    .tl-toggle-btn {
      margin-left: auto; background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: .25rem .6rem; font-size: .72rem;
      cursor: pointer; color: var(--text-subtle); transition: border-color .15s;
    }
    .tl-toggle-btn:hover { border-color: var(--border-active); color: var(--text-muted); }
    #tl-status { font-size: .72rem; color: var(--text-subtle); }
    #tl-count  { font-size: .75rem; color: var(--text-subtle); }

    .tl-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .tl-view.hidden { display: none; }
    #events-list, #fused-events-list { flex: 1; overflow-y: auto; padding: .5rem .6rem; }

    /* Conflict section */
    #conflicts-section { flex-shrink: 0; }
    .conflict-card {
      margin: .4rem .6rem; border: 1px solid var(--amber-border); border-radius: 8px;
      background: var(--amber-dim); padding: .5rem .65rem; font-size: .78rem;
    }
    .conflict-header { display: flex; align-items: center; gap: .4rem; margin-bottom: .3rem; }
    .conflict-type-badge {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      padding: .12rem .4rem; border-radius: 999px; white-space: nowrap;
      background: rgba(251,191,36,.25); color: var(--amber);
    }
    .conflict-detail { font-size: .77rem; color: var(--text-muted); flex: 1; }
    .conflict-events { display: flex; gap: .4rem; margin-bottom: .4rem; }
    .conflict-ev {
      flex: 1; background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 6px; padding: .3rem .5rem; font-size: .72rem; color: var(--text-muted);
    }
    .conflict-ev-label { font-size: .62rem; color: var(--text-subtle); display: block; }
    .conflict-actions { display: flex; gap: .3rem; flex-wrap: wrap; }
    .conflict-resolve-btn {
      font-size: .7rem; border: 1px solid var(--border); border-radius: 5px;
      padding: .2rem .5rem; cursor: pointer;
      background: var(--surface-raised); color: var(--text-muted); transition: background .15s;
    }
    .conflict-resolve-btn:hover { background: var(--surface-high); }
    .conflict-resolve-btn.active { background: var(--primary-dim); color: var(--primary); border-color: var(--primary-border); }
    .conflict-resolved-label { font-size: .7rem; color: #6ee7b7; font-style: italic; }

    /* Canonical event extras */
    .event-flag { color: var(--amber); font-size: .75rem; flex-shrink: 0; }
    .event-sources { display: flex; gap: .25rem; flex-wrap: wrap; margin-top: .2rem; }
    .src-chip {
      font-size: .62rem; padding: .1rem .35rem; border-radius: 999px;
      background: var(--surface-highest); color: var(--text-subtle); border: 1px solid var(--border);
    }
    .cluster-hint { font-size: .65rem; color: var(--text-subtle); margin-top: .15rem; }

    /* ── Confidence badge (amber = mid, unified with vague-date colour) ── */
    .conf-badge {
      font-size: .58rem; font-weight: 700; letter-spacing: .04em;
      padding: .1rem .38rem; border-radius: 999px;
      text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
    }
    .conf-high { background: var(--primary-dim);          color: var(--primary); }
    .conf-mid  { background: var(--amber-dim);            color: var(--amber); }   /* same amber as vague dates */
    .conf-low  { background: rgba(239,68,68,.12);         color: #f87171; }

    /* ── Re-extract hint banner ── */
    .reextract-hint {
      margin: .4rem .5rem 0; padding: .45rem .65rem;
      background: var(--primary-dim); border: 1px solid var(--primary-border);
      border-radius: 6px; font-size: .76rem; color: var(--primary); line-height: 1.4;
    }

    .year-group { margin-bottom: .75rem; }
    .year-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-subtle);
      padding: .2rem .2rem .3rem; border-bottom: 1px solid var(--border);
      margin-bottom: .4rem;
    }
    .event-card {
      background: var(--surface-raised); border: 1px solid var(--border); border-radius: 8px;
      padding: .5rem .65rem; margin-bottom: .35rem;
      cursor: default; transition: background .1s, border-color .1s;
    }
    .event-card:hover { background: var(--surface-high); border-color: var(--border-active); }
    .event-card-top { display: flex; align-items: flex-start; gap: .4rem; }
    .event-badge {
      font-size: .6rem; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; padding: .15rem .45rem;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }
    /* Dark-adapted type badges */
    .badge-Diagnosis      { background: rgba(239,68,68,.15);   color: #f87171; }
    .badge-Medication     { background: rgba(96,165,250,.15);   color: #93c5fd; }
    .badge-LabResult      { background: rgba(52,211,153,.15);   color: #6ee7b7; }
    .badge-Surgery        { background: rgba(251,191,36,.15);   color: #fcd34d; }
    .badge-Hospitalization{ background: rgba(167,139,250,.15);  color: #c4b5fd; }
    .badge-Symptom        { background: rgba(253,224,71,.15);   color: #fde68a; }
    .badge-Consultation   { background: rgba(148,163,184,.15);  color: #94a3b8; }

    .event-desc { font-size: .8rem; color: var(--text); flex: 1; line-height: 1.4; }
    .event-meta { display: flex; gap: .5rem; margin-top: .25rem; align-items: center; }
    .event-date { font-size: .7rem; color: var(--text-subtle); }
    .event-date.vague { color: var(--amber); }    /* amber: unified warning/attention */
    .event-src  { font-size: .65rem; color: var(--text-subtle); margin-left: auto; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.25rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface-highest); color: var(--text);
      padding: .5rem 1.2rem; border-radius: 8px; border: 1px solid var(--border);
      font-size: .82rem; transition: transform .25s ease;
      pointer-events: none; z-index: 100;
    }
    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.error { background: rgba(239,68,68,.9); border-color: #f87171; color: #fff; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>MediTrace</h1>
  <span id="session-label">Starting session…</span>
  <button id="btn-new-session">New Session</button>
</div>

<div id="panels">
  <!-- LEFT: Documents -->
  <div class="panel" id="panel-docs">
    <div class="panel-header">Documents</div>
    <div id="doc-upload-area">
      <div id="dropzone">
        <div>📎 Drop PDF or image here</div>
        <div>or <label for="file-input" class="file-label">browse files</label></div>
        <input type="file" id="file-input" accept=".pdf,image/*" multiple hidden>
      </div>
    </div>
    <div id="doc-list">
      <div class="doc-empty">No documents yet.</div>
    </div>
  </div>

  <!-- CENTER: Interview -->
  <div class="panel" id="panel-interview">
    <div class="panel-header">Interview</div>

    <div id="coverage-strip">
      <!-- filled by JS -->
    </div>

    <div id="chat-messages">
      <!-- messages appended here -->
    </div>

    <div id="chat-footer">
      <div id="complete-banner">
        Interview complete — all topics covered.
      </div>
      <button id="btn-generate-timeline">Generate Timeline</button>
      <div id="chat-input-row">
        <textarea id="chat-input" rows="2" placeholder="Type your response…"></textarea>
        <button id="btn-mic" title="Click to record">🎤</button>
        <button id="btn-send">Send</button>
      </div>
      <button id="btn-end-interview">End interview early</button>
    </div>
  </div>

  <!-- RIGHT: Timeline (fused) / Raw events toggle -->
  <div class="panel" id="panel-timeline">
    <div class="panel-header" style="display:flex;align-items:center">
      <span id="tl-panel-label">Timeline</span>
      <button id="btn-tl-toggle" class="tl-toggle-btn">Raw events</button>
    </div>
    <div id="tl-toolbar">
      <button id="btn-extract">Extract</button>
      <button id="btn-generate" disabled>Generate timeline</button>
      <span id="tl-status"></span>
      <span id="tl-count"></span>
    </div>

    <!-- Fused timeline view (active after generation) -->
    <div id="view-fused" class="tl-view hidden">
      <div id="conflicts-section"></div>
      <div id="fused-events-list">
        <div class="placeholder">Timeline will appear here.</div>
      </div>
    </div>

    <!-- Raw events view -->
    <div id="view-raw" class="tl-view">
      <div id="events-list">
        <div class="placeholder">Run "Extract" after the interview or uploading documents.</div>
      </div>
    </div>

</div>

<div id="toast"></div>

<!-- Audit modal -->
<div id="audit-modal" class="modal hidden">
  <div class="modal-backdrop" id="audit-backdrop"></div>
  <div class="modal-box">
    <div class="modal-header">
      <span id="audit-title"></span>
      <button id="audit-close">×</button>
    </div>
    <div class="modal-body" id="audit-body"></div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────
const TOPIC_LABELS = {
  chief_complaint:    'Chief complaint',
  chronic_conditions: 'Chronic',
  medications:        'Medications',
  surgeries:          'Surgeries',
  hospitalizations:   'Hospitalizations',
  allergies:          'Allergies',
  family_history:     'Family history',
};

// ── State ──────────────────────────────────────────────────
let sessionId = null;
let interviewDone = false;
let mediaRecorder = null;
let audioChunks = [];

// ── DOM refs ───────────────────────────────────────────────
const chatMessages   = document.getElementById('chat-messages');
const chatInput      = document.getElementById('chat-input');
const btnSend        = document.getElementById('btn-send');
const btnMic         = document.getElementById('btn-mic');
const btnEnd         = document.getElementById('btn-end-interview');
const btnNew         = document.getElementById('btn-new-session');
const sessionLabel   = document.getElementById('session-label');
const coverageStrip  = document.getElementById('coverage-strip');
const completeBanner = document.getElementById('complete-banner');
const btnGenTimeline = document.getElementById('btn-generate-timeline');
const toast          = document.getElementById('toast');

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = isError ? 'show error' : 'show';
  toastTimer = setTimeout(() => { toast.className = ''; }, 3500);
}

// ── Coverage strip ─────────────────────────────────────────
function renderCoverage(coverageMap) {
  coverageStrip.innerHTML = '';
  for (const [topic, status] of Object.entries(coverageMap)) {
    const pill = document.createElement('span');
    pill.className = `pill pill-${status}`;
    pill.title = `${TOPIC_LABELS[topic] ?? topic}: ${status}`;
    pill.textContent = TOPIC_LABELS[topic] ?? topic;
    coverageStrip.appendChild(pill);
  }
}

function initCoverageStrip() {
  const empty = {};
  for (const k of Object.keys(TOPIC_LABELS)) empty[k] = 'uncovered';
  renderCoverage(empty);
}

// ── Chat helpers ───────────────────────────────────────────
function appendMessage(role, text) {
  // Remove typing indicator if present
  const existing = chatMessages.querySelector('.typing-indicator');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function appendSystem(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'typing-indicator msg-assistant';
  wrap.style.alignSelf = 'flex-start';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(dots);
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ── Disable / enable input ─────────────────────────────────
function setInputEnabled(enabled) {
  chatInput.disabled = !enabled;
  btnSend.disabled   = !enabled;
  btnEnd.disabled    = !enabled;
  btnMic.disabled    = !enabled;
}

// ── Interview complete state ───────────────────────────────
function markInterviewComplete() {
  interviewDone = false;          // keep input live — patient may add late details
  completeBanner.style.display = 'block';
  btnGenTimeline.style.display = 'block';
  // Hide "end early" button (interview is already complete)
  btnEnd.style.display = 'none';
  setInputEnabled(true);          // leave text + mic open for follow-ups
  appendSystem('— Interview complete — feel free to add anything else —');
}

// ── Voice recording ────────────────────────────────────────
async function startRecording() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    showToast('Microphone access denied — use the text input instead.', true);
    return;
  }

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    stream.getTracks().forEach(t => t.stop());
    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(audioChunks, { type: mimeType });
    sendVoiceTurn(blob, mimeType);
  };

  mediaRecorder.start();
  btnMic.classList.add('recording');
  btnMic.textContent = '⏹';
  btnMic.title = 'Click to stop recording';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  btnMic.classList.remove('recording');
  btnMic.textContent = '🎤';
  btnMic.title = 'Click to record';
}

async function sendVoiceTurn(blob, mimeType) {
  if (interviewDone || !sessionId) return;

  setInputEnabled(false);

  // Show transcribing indicator
  const transcribingEl = document.createElement('div');
  transcribingEl.className = 'msg msg-system';
  transcribingEl.textContent = 'Transcribing…';
  chatMessages.appendChild(transcribingEl);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  const formData = new FormData();
  formData.append('audio', blob, 'recording.webm');

  try {
    const res = await fetch(`/api/sessions/${sessionId}/interview/voice-turn`, {
      method: 'POST',
      body: formData,
    });

    transcribingEl.remove();

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({ detail: 'Unknown error' }));
      showToast(
        res.status === 422
          ? "Couldn't hear that — try again or type your answer."
          : (errBody.detail ?? `HTTP ${res.status}`),
        true
      );
      return;
    }

    const data = await res.json();
    appendMessage('user', data.transcript);
    appendMessage('assistant', data.reply);
    renderCoverage(data.coverage);

    if (data.interview_complete) {
      await callComplete().catch(() => {});
      markInterviewComplete();
    }
  } catch (err) {
    transcribingEl.remove();
    showToast("Couldn't hear that — try again or type your answer.", true);
  } finally {
    if (!interviewDone) {
      setInputEnabled(true);
      chatInput.focus();
    }
  }
}

btnMic.addEventListener('click', () => {
  if (interviewDone || !sessionId) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    startRecording();
  }
});

// ── API calls ──────────────────────────────────────────────
async function createSession() {
  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({}),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function sendTurn(message) {
  const res = await fetch(`/api/sessions/${sessionId}/interview/turn`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
    throw new Error(err.detail ?? `HTTP ${res.status}`);
  }
  return res.json();
}

async function callComplete() {
  const res = await fetch(`/api/sessions/${sessionId}/interview/complete`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
  });
  if (!res.ok && res.status !== 409) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Main turn handler ──────────────────────────────────────
async function doTurn(userMessage) {
  if (interviewDone || !sessionId) return;

  setInputEnabled(false);

  if (userMessage) {
    appendMessage('user', userMessage);
  }

  showTyping();

  try {
    const data = await sendTurn(userMessage);
    appendMessage('assistant', data.reply);
    renderCoverage(data.coverage);

    if (data.interview_complete) {
      await callComplete().catch(() => {});
      markInterviewComplete();
    }
  } catch (err) {
    // Remove typing indicator on error
    const indicator = chatMessages.querySelector('.typing-indicator');
    if (indicator) indicator.remove();
    appendSystem('The assistant had trouble — please try again.');
    showToast(err.message, true);
  } finally {
    if (!interviewDone) {
      setInputEnabled(true);
      chatInput.focus();
    }
  }
}

// ── Send button / enter key ────────────────────────────────
btnSend.addEventListener('click', () => {
  const msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';
  doTurn(msg);
});

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    btnSend.click();
  }
});

// ── End interview early ────────────────────────────────────
btnEnd.addEventListener('click', async () => {
  if (interviewDone || !sessionId) return;
  setInputEnabled(false);
  try {
    await callComplete();
    markInterviewComplete();
    showToast('Interview ended early.');
  } catch (err) {
    setInputEnabled(true);
    showToast(err.message, true);
  }
});

// ── URL param helpers ──────────────────────────────────────
function getSessionParam() {
  return new URLSearchParams(location.search).get('session');
}

function setSessionParam(id) {
  history.replaceState(null, '', '?session=' + id);
}

// ── New session button ─────────────────────────────────────
btnNew.addEventListener('click', async () => {
  if (!confirm('Start a new session? The current session stays in the database.')) return;
  btnNew.disabled = true;
  try {
    const session = await createSession();
    // Navigate to the new session URL — page reload gives a clean state
    location.href = '?session=' + session.id;
  } catch (err) {
    showToast(err.message, true);
    btnNew.disabled = false;
  }
});

// ── Rehydrate an existing session ─────────────────────────
async function rehydrate(id) {
  const res = await fetch(`/api/sessions/${id}`);
  if (!res.ok) throw new Error(`Session ${id} not found (HTTP ${res.status})`);
  const session = await res.json();

  sessionId = session.id;
  sessionLabel.textContent = `Session: ${session.id.slice(0, 8)}…`;
  sessionLabel.title = session.id;

  // Restore coverage pills
  const coverage = session.interview_state?.coverage_map;
  if (coverage && Object.keys(coverage).length) renderCoverage(coverage);
  else initCoverageStrip();

  // Restore docs, events, timeline
  refreshDocList();
  loadEvents();
  loadTimeline();
  _enableGenerate();

  // Replay transcript into chat
  for (const turn of (session.transcript || [])) {
    appendMessage(turn.role, turn.content);
  }

  // Restore complete state if applicable
  const doneStatuses = ['interview_complete', 'processing', 'timeline_generated'];
  if (doneStatuses.includes(session.status)) {
    markInterviewComplete();
    return;
  }

  // If transcript is empty this is a fresh session — fire opening turn
  if (!session.transcript || session.transcript.length === 0) {
    await doTurn('');
  } else {
    setInputEnabled(true);
    chatInput.focus();
  }
}

// ── Boot ───────────────────────────────────────────────────
async function boot() {
  initCoverageStrip();
  setInputEnabled(false);

  const existingId = getSessionParam();

  if (existingId) {
    try {
      await rehydrate(existingId);
    } catch (err) {
      // Bad/expired ID — fall through and create a fresh session
      appendSystem('Could not load session — starting a new one.');
      showToast(err.message, true);
      await startFreshSession();
    }
  } else {
    await startFreshSession();
  }
}

async function startFreshSession() {
  try {
    const session = await createSession();
    sessionId = session.id;
    sessionLabel.textContent = `Session: ${session.id.slice(0, 8)}…`;
    sessionLabel.title = session.id;
    setSessionParam(session.id);
    refreshDocList();
    loadEvents();
    _enableGenerate();
    await doTurn('');
  } catch (err) {
    appendSystem('Failed to start session. Check the server and refresh.');
    showToast(err.message, true);
    sessionLabel.textContent = 'Error';
  }
}

// ── Document panel ─────────────────────────────────────────
const dropzone  = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const docList   = document.getElementById('doc-list');
const auditModal   = document.getElementById('audit-modal');
const auditBackdrop = document.getElementById('audit-backdrop');
const auditClose   = document.getElementById('audit-close');
const auditTitle   = document.getElementById('audit-title');
const auditBody    = document.getElementById('audit-body');

let pollTimer = null;

// Status chip factory
function makeChip(status) {
  const chip = document.createElement('span');
  chip.className = `status-chip chip-${status}`;
  chip.title = status;
  chip.textContent = { pending: '⏳', done: '✓', unreadable: '⚠', error: '✗' }[status] ?? status;
  return chip;
}

// Render the document list
function renderDocList(docs) {
  docList.innerHTML = '';
  if (!docs.length) {
    docList.innerHTML = '<div class="doc-empty">No documents yet.</div>';
    return;
  }
  for (const doc of docs) {
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.dataset.status = doc.ocr_status;

    item.appendChild(makeChip(doc.ocr_status));

    const name = document.createElement('span');
    name.className = 'doc-name';
    name.textContent = doc.filename || doc.kind;
    name.title = doc.filename || '';
    item.appendChild(name);

    const kind = document.createElement('span');
    kind.className = 'doc-kind';
    kind.textContent = doc.kind === 'pdf_typed' ? 'PDF' : 'IMG';
    item.appendChild(kind);

    if (doc.ocr_status === 'error' || doc.ocr_status === 'unreadable') {
      const reup = document.createElement('button');
      reup.className = 'doc-reupload';
      reup.title = 'Re-upload';
      reup.textContent = '↑';
      reup.onclick = (e) => { e.stopPropagation(); fileInput.click(); };
      item.appendChild(reup);
    }

    item.addEventListener('click', () => openAudit(doc.source_id));
    docList.appendChild(item);
  }
}

// Fetch doc list and update UI; start polling if any pending
async function refreshDocList() {
  if (!sessionId) return;
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents`);
    if (!res.ok) return;
    const docs = await res.json();
    renderDocList(docs);
    if (docs.some(d => d.ocr_status === 'pending')) startPolling();
  } catch (_) { /* silent */ }
}

// Re-extract hint: shown when a new document finishes OCR after a timeline
// already exists, so the user knows to re-extract and regenerate.
function showReextractHint() {
  if (document.getElementById('reextract-hint') || !_tlData) return;
  const hint = document.createElement('div');
  hint.id = 'reextract-hint';
  hint.className = 'reextract-hint';
  hint.innerHTML =
    '📄 New document processed — click <strong>Extract</strong> then ' +
    '<strong>Generate</strong> to fold it into the timeline.';
  docList.before(hint);
}

function clearReextractHint() {
  document.getElementById('reextract-hint')?.remove();
}

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    if (!sessionId) return;
    const res = await fetch(`/api/sessions/${sessionId}/documents`).catch(() => null);
    if (!res?.ok) return;
    const docs = await res.json();
    renderDocList(docs);
    if (!docs.some(d => d.ocr_status === 'pending')) {
      clearInterval(pollTimer);
      pollTimer = null;
      // If a timeline already exists, hint that re-extraction is needed
      showReextractHint();
    }
  }, 2000);
}

// Upload a single file
async function handleUpload(file) {
  if (!sessionId) { showToast('Start a session first.', true); return; }
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents`, {
      method: 'POST', body: form,
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${res.status}`);
    }
    await refreshDocList();
    startPolling();
  } catch (err) {
    showToast(`Upload failed: ${err.message}`, true);
  }
}

// Audit modal
async function openAudit(sourceId) {
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents/${sourceId}`);
    if (!res.ok) return;
    const data = await res.json();

    auditTitle.textContent = data.filename || data.kind;
    auditBody.innerHTML = '';

    // Status row
    const statusRow = document.createElement('div');
    statusRow.className = 'audit-status-row';
    statusRow.innerHTML = `Status: <strong>${data.ocr_status}</strong>`;
    auditBody.appendChild(statusRow);

    // Warnings
    const warnings = data.extraction_meta?.warnings || [];
    if (warnings.length) {
      const warnBox = document.createElement('div');
      warnBox.className = 'audit-warnings';
      warnBox.innerHTML = warnings.map(w => `<div class="warn-item">⚠ ${w}</div>`).join('');
      auditBody.appendChild(warnBox);
    }

    // Extracted text
    if (data.extracted_text) {
      const t = document.createElement('div');
      t.className = 'audit-section-title';
      t.textContent = 'Extracted Text';
      auditBody.appendChild(t);
      const pre = document.createElement('pre');
      pre.className = 'audit-text';
      pre.textContent = data.extracted_text;
      auditBody.appendChild(pre);
    }

    // Structured meta (filtered — hide model/page_count/warnings already shown)
    const metaKeys = Object.keys(data.extraction_meta).filter(
      k => !['warnings', 'model', 'page_count'].includes(k)
    );
    if (metaKeys.length) {
      const mt = document.createElement('div');
      mt.className = 'audit-section-title';
      mt.textContent = 'Structured Fields';
      auditBody.appendChild(mt);
      const filtered = Object.fromEntries(metaKeys.map(k => [k, data.extraction_meta[k]]));
      const pre = document.createElement('pre');
      pre.className = 'audit-meta';
      pre.textContent = JSON.stringify(filtered, null, 2);
      auditBody.appendChild(pre);
    }

    auditModal.classList.remove('hidden');
  } catch (_) { /* silent */ }
}

function closeAudit() { auditModal.classList.add('hidden'); }
auditClose.addEventListener('click', closeAudit);
auditBackdrop.addEventListener('click', closeAudit);

// Drag-and-drop
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', async (e) => {
  e.preventDefault();
  dropzone.classList.remove('over');
  for (const f of Array.from(e.dataTransfer.files)) await handleUpload(f);
});

// File picker
fileInput.addEventListener('change', async (e) => {
  for (const f of Array.from(e.target.files)) await handleUpload(f);
  e.target.value = '';
});

// Clicking anywhere on the dropzone that isn't the label triggers file picker
dropzone.addEventListener('click', (e) => {
  if (e.target.tagName !== 'LABEL') fileInput.click();
});

// ── Timeline / events panel ────────────────────────────────
const btnExtract = document.getElementById('btn-extract');
const eventsList = document.getElementById('events-list');
const tlCount    = document.getElementById('tl-count');

const TYPE_LABELS = {
  Diagnosis: 'Diagnosis', Medication: 'Medication', LabResult: 'Lab Result',
  Surgery: 'Surgery', Hospitalization: 'Hospitalization',
  Symptom: 'Symptom', Consultation: 'Consultation',
};

// Confidence band thresholds — adjust here to recalibrate all badges.
// high >= HIGH → green, MID <= x < HIGH → amber, < MID → red.
const CONF = { HIGH: 0.8, MID: 0.5 };

function formatEventDate(ev) {
  const vague = ev.date_confidence < 0.5;
  let label = '';
  if (ev.date_start) {
    const d = new Date(ev.date_start + 'T00:00:00');
    const opts = ev.date_precision === 'exact'
      ? { day: 'numeric', month: 'short', year: 'numeric' }
      : ev.date_precision === 'month'
        ? { month: 'short', year: 'numeric' }
        : { year: 'numeric' };
    label = d.toLocaleDateString('en-IN', opts);
    if (vague) label = '~ ' + label;
  } else if (ev.date_raw) {
    label = '~ ' + ev.date_raw;
  } else {
    label = 'Unknown date';
  }
  return { label, vague };
}

function makeConfBadge(confidence) {
  const b = document.createElement('span');
  b.className = 'conf-badge';
  if (confidence >= CONF.HIGH)      { b.classList.add('conf-high'); b.textContent = 'High'; }
  else if (confidence >= CONF.MID)  { b.classList.add('conf-mid');  b.textContent = 'Mid';  }
  else                               { b.classList.add('conf-low');  b.textContent = 'Low';  }
  return b;
}

function yearOf(ev) {
  if (ev.date_start) return new Date(ev.date_start + 'T00:00:00').getFullYear();
  return null;
}

function renderEvents(events) {
  eventsList.innerHTML = '';
  if (!events.length) {
    eventsList.innerHTML = '<div class="doc-empty">No events extracted yet.</div>';
    tlCount.textContent = '';
    return;
  }

  tlCount.textContent = `${events.length} event${events.length !== 1 ? 's' : ''}`;

  // Group by year (null → "Unknown date")
  const groups = new Map();
  for (const ev of events) {
    const yr = yearOf(ev) ?? '?';
    if (!groups.has(yr)) groups.set(yr, []);
    groups.get(yr).push(ev);
  }

  // Sort years: numeric ascending, '?' at end
  const sortedYears = [...groups.keys()].sort((a, b) => {
    if (a === '?' && b === '?') return 0;
    if (a === '?') return 1;
    if (b === '?') return -1;
    return a - b;
  });

  for (const yr of sortedYears) {
    const grp = document.createElement('div');
    grp.className = 'year-group';

    const lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = yr === '?' ? 'Date unknown' : yr;
    grp.appendChild(lbl);

    for (const ev of groups.get(yr)) {
      const card = document.createElement('div');
      card.className = 'event-card';

      const top = document.createElement('div');
      top.className = 'event-card-top';

      const badge = document.createElement('span');
      badge.className = `event-badge badge-${ev.event_type}`;
      badge.textContent = TYPE_LABELS[ev.event_type] ?? ev.event_type;

      const desc = document.createElement('div');
      desc.className = 'event-desc';
      desc.textContent = ev.description;

      top.appendChild(badge);
      top.appendChild(desc);
      card.appendChild(top);

      const meta = document.createElement('div');
      meta.className = 'event-meta';

      const { label, vague } = formatEventDate(ev);
      const dateEl = document.createElement('span');
      dateEl.className = 'event-date' + (vague ? ' vague' : '');
      dateEl.textContent = label;
      meta.appendChild(dateEl);

      if (ev.source_id) {
        const srcEl = document.createElement('span');
        srcEl.className = 'event-src';
        srcEl.textContent = '📄 doc';
        srcEl.title = ev.source_id;
        meta.appendChild(srcEl);
      } else {
        const srcEl = document.createElement('span');
        srcEl.className = 'event-src';
        srcEl.textContent = '💬 interview';
        meta.appendChild(srcEl);
      }

      card.appendChild(meta);
      grp.appendChild(card);
    }
    eventsList.appendChild(grp);
  }
}

async function runExtract() {
  if (!sessionId) return;
  clearReextractHint();   // dismiss the "re-extract needed" hint
  btnExtract.disabled = true;
  btnExtract.textContent = 'Extracting…';
  try {
    const r1 = await fetch(`/api/sessions/${sessionId}/events/extract`, { method: 'POST' });
    if (!r1.ok) {
      const e = await r1.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${r1.status}`);
    }
    const summary = await r1.json();

    // If we just re-extracted after a timeline was generated, the backend
    // reset status to interview_complete and cleared conflicts/canonical flags.
    // Switch back to raw view so the user sees the fresh events.
    switchView('raw');
    fusedList.innerHTML = '<div class="placeholder">Re-extracted — click Generate timeline to fuse.</div>';
    conflictsSec.innerHTML = '';
    _tlData = null;
    btnGenerate.textContent = 'Generate timeline';

    const r2 = await fetch(`/api/sessions/${sessionId}/events`);
    const events = await r2.json();
    renderEvents(events);
    showToast(`Extracted ${summary.total} event${summary.total !== 1 ? 's' : ''}`);
  } catch (err) {
    showToast(`Extraction failed: ${err.message}`, true);
  } finally {
    btnExtract.disabled = false;
    btnExtract.textContent = 'Extract events';
  }
}

async function loadEvents() {
  if (!sessionId) return;
  try {
    const r = await fetch(`/api/sessions/${sessionId}/events`);
    if (!r.ok) return;
    const events = await r.json();
    if (events.length) renderEvents(events);
  } catch (_) { /* silent */ }
}

btnExtract.addEventListener('click', runExtract);

// ── Fused timeline panel ────────────────────────────────────
const btnGenerate    = document.getElementById('btn-generate');
const btnTlToggle    = document.getElementById('btn-tl-toggle');
const tlPanelLabel   = document.getElementById('tl-panel-label');
const tlStatus       = document.getElementById('tl-status');
const viewFused      = document.getElementById('view-fused');
const viewRaw        = document.getElementById('view-raw');
const conflictsSec   = document.getElementById('conflicts-section');
const fusedList      = document.getElementById('fused-events-list');

let tlPollTimer = null;
let tlMode = 'raw';        // 'raw' | 'fused'
let _tlData = null;        // last TimelineOut response

// ── View toggle ─────────────────────────────────────────────
function switchView(mode) {
  tlMode = mode;
  if (mode === 'fused') {
    viewFused.classList.remove('hidden');
    viewRaw.classList.add('hidden');
    tlPanelLabel.textContent = 'Timeline';
    btnTlToggle.textContent = 'Raw events';
  } else {
    viewRaw.classList.remove('hidden');
    viewFused.classList.add('hidden');
    tlPanelLabel.textContent = 'Raw events';
    btnTlToggle.textContent = 'Timeline';
  }
}

btnTlToggle.addEventListener('click', () => {
  switchView(tlMode === 'fused' ? 'raw' : 'fused');
});

// ── Generate ─────────────────────────────────────────────────
async function runGenerate() {
  if (!sessionId) return;
  btnGenerate.disabled = true;
  btnGenerate.textContent = 'Generating…';
  tlStatus.textContent = '⏳';
  try {
    const r = await fetch(`/api/sessions/${sessionId}/timeline/generate`, { method: 'POST' });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.error || e.detail || `HTTP ${r.status}`);
    }
    startTlPoll();
  } catch (err) {
    showToast(err.message, true);
    btnGenerate.disabled = false;
    btnGenerate.textContent = 'Generate timeline';
    tlStatus.textContent = '';
  }
}

function startTlPoll() {
  if (tlPollTimer) return;
  tlPollTimer = setInterval(async () => {
    if (!sessionId) return;
    const r = await fetch(`/api/sessions/${sessionId}/timeline`).catch(() => null);
    if (!r?.ok) return;
    const data = await r.json();
    if (data.status === 'timeline_generated') {
      clearInterval(tlPollTimer); tlPollTimer = null;
      _tlData = data;
      renderFusedTimeline(data);
      switchView('fused');
      btnGenerate.disabled = false;
      btnGenerate.textContent = 'Regenerate';
      tlStatus.textContent = '';
      showToast(`Timeline ready — ${data.events.length} events`);
    } else if (data.status === 'failed') {
      clearInterval(tlPollTimer); tlPollTimer = null;
      showToast('Timeline generation failed.', true);
      btnGenerate.disabled = false;
      btnGenerate.textContent = 'Generate timeline';
      tlStatus.textContent = '';
    }
  }, 1500);
}

// ── Render fused timeline ────────────────────────────────────
function renderFusedTimeline(data) {
  _tlData = data;
  const conflictedIds = new Set(
    data.conflicts.flatMap(c => [c.event_a_id, c.event_b_id])
  );

  // Conflicts section
  conflictsSec.innerHTML = '';
  if (data.conflicts.length) {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#991b1b;padding:.4rem .6rem .1rem;';
    hdr.textContent = `⚠ ${data.conflicts.length} conflict${data.conflicts.length > 1 ? 's' : ''}`;
    conflictsSec.appendChild(hdr);
    data.conflicts.forEach(c => conflictsSec.appendChild(makeConflictCard(c, data.events)));
  }

  // Fused events by year
  fusedList.innerHTML = '';
  if (!data.events.length) {
    fusedList.innerHTML = '<div class="doc-empty">No events in timeline.</div>';
    return;
  }

  const groups = new Map();
  for (const ev of data.events) {
    const yr = ev.date_start ? new Date(ev.date_start + 'T00:00:00').getFullYear() : '?';
    if (!groups.has(yr)) groups.set(yr, []);
    groups.get(yr).push(ev);
  }
  const sortedYrs = [...groups.keys()].sort((a, b) => {
    if (a === '?' && b === '?') return 0;
    if (a === '?') return 1; if (b === '?') return -1; return a - b;
  });

  for (const yr of sortedYrs) {
    // Negation events (patient denials) are kept in evMap for conflict card
    // descriptions, but they must NOT appear as positive timeline occurrence cards.
    const positiveEvs = groups.get(yr).filter(ev => !ev.is_negation);
    if (!positiveEvs.length) continue;

    const grp = document.createElement('div');
    grp.className = 'year-group';
    const lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = yr === '?' ? 'Date unknown' : yr;
    grp.appendChild(lbl);
    for (const ev of positiveEvs) {
      grp.appendChild(makeCanonicalCard(ev, conflictedIds.has(ev.id)));
    }
    fusedList.appendChild(grp);
  }
}

function makeCanonicalCard(ev, hasConflict) {
  const card = document.createElement('div');
  card.className = 'event-card';
  if (hasConflict) card.style.borderColor = '#fca5a5';

  const top = document.createElement('div');
  top.className = 'event-card-top';

  const badge = document.createElement('span');
  badge.className = `event-badge badge-${ev.event_type}`;
  badge.textContent = ev.event_type;

  const desc = document.createElement('div');
  desc.className = 'event-desc';
  desc.textContent = ev.description;

  if (hasConflict) {
    const flag = document.createElement('span');
    flag.className = 'event-flag'; flag.textContent = '⚠';
    flag.title = 'Conflict detected — see conflicts section';
    top.appendChild(badge); top.appendChild(desc); top.appendChild(flag);
  } else {
    top.appendChild(badge); top.appendChild(desc);
  }
  card.appendChild(top);

  // Date
  const { label, vague } = formatEventDate(ev);
  const meta = document.createElement('div');
  meta.className = 'event-meta';
  const dateEl = document.createElement('span');
  dateEl.className = 'event-date' + (vague ? ' vague' : '');
  dateEl.textContent = label;
  meta.appendChild(dateEl);

  // Confidence badge (read-only — reflects stored confidence)
  meta.appendChild(makeConfBadge(ev.confidence));

  // Cluster hint
  if (ev.cluster_size > 1) {
    const hint = document.createElement('span');
    hint.className = 'cluster-hint';
    hint.textContent = `${ev.cluster_size} sources merged`;
    meta.appendChild(hint);
  }
  card.appendChild(meta);

  // Source chips
  if (ev.source_ids && ev.source_ids.length) {
    const srcs = document.createElement('div');
    srcs.className = 'event-sources';
    ev.source_ids.forEach(sid => {
      const chip = document.createElement('span');
      chip.className = 'src-chip';
      chip.textContent = '📄';
      chip.title = sid;
      srcs.appendChild(chip);
    });
    if (!ev.source_ids.length) {  // interview only
      const chip = document.createElement('span');
      chip.className = 'src-chip'; chip.textContent = '💬 interview';
      srcs.appendChild(chip);
    }
    card.appendChild(srcs);
  } else {
    const srcs = document.createElement('div');
    srcs.className = 'event-sources';
    const chip = document.createElement('span');
    chip.className = 'src-chip'; chip.textContent = '💬 interview';
    srcs.appendChild(chip);
    card.appendChild(srcs);
  }

  return card;
}

function makeConflictCard(conflict, allEvents) {
  const evMap = Object.fromEntries(allEvents.map(e => [e.id, e]));
  const evA = evMap[conflict.event_a_id];
  const evB = evMap[conflict.event_b_id];

  const card = document.createElement('div');
  card.className = 'conflict-card';
  card.dataset.conflictId = conflict.id;

  const hdr = document.createElement('div');
  hdr.className = 'conflict-header';
  const typeBadge = document.createElement('span');
  typeBadge.className = 'conflict-type-badge';
  typeBadge.textContent = conflict.conflict_type.replace(/_/g, ' ');
  const detail = document.createElement('span');
  detail.className = 'conflict-detail';
  detail.textContent = conflict.detail;
  hdr.appendChild(typeBadge); hdr.appendChild(detail);
  card.appendChild(hdr);

  // Event pair
  const evPair = document.createElement('div');
  evPair.className = 'conflict-events';
  [evA, evB].forEach((ev, i) => {
    const box = document.createElement('div');
    box.className = 'conflict-ev';
    const lbl = document.createElement('span');
    lbl.className = 'conflict-ev-label';
    lbl.textContent = i === 0 ? 'Source A' : 'Source B';
    box.appendChild(lbl);
    box.appendChild(document.createTextNode(ev ? ev.description : '(unknown)'));
    evPair.appendChild(box);
  });
  card.appendChild(evPair);

  // Resolution buttons
  const actions = document.createElement('div');
  actions.className = 'conflict-actions';

  if (conflict.resolution !== 'unresolved') {
    const resolved = document.createElement('span');
    resolved.className = 'conflict-resolved-label';
    resolved.textContent = `✓ Resolved: ${conflict.resolution.replace(/_/g, ' ')}`;
    actions.appendChild(resolved);
  } else {
    [['a_wins', 'A is correct'], ['b_wins', 'B is correct'], ['both_noted', 'Note both']].forEach(([val, label]) => {
      const btn = document.createElement('button');
      btn.className = 'conflict-resolve-btn';
      if (conflict.resolution === val) btn.classList.add('active');
      btn.textContent = label;
      btn.onclick = () => resolveConflict(conflict.id, val, card);
      actions.appendChild(btn);
    });
  }
  card.appendChild(actions);
  return card;
}

async function resolveConflict(conflictId, resolution, cardEl) {
  if (!sessionId) return;
  try {
    const r = await fetch(`/api/sessions/${sessionId}/conflicts/${conflictId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ resolution }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    // Re-render conflicts section
    if (_tlData) {
      const idx = _tlData.conflicts.findIndex(c => c.id === conflictId);
      if (idx >= 0) _tlData.conflicts[idx].resolution = resolution;
      renderFusedTimeline(_tlData);
    }
    showToast('Conflict resolved');
  } catch (err) {
    showToast(err.message, true);
  }
}

// Load existing timeline on session rehydrate
async function loadTimeline() {
  if (!sessionId) return;
  try {
    const r = await fetch(`/api/sessions/${sessionId}/timeline`);
    if (!r.ok) return;
    const data = await r.json();
    if (data.status === 'timeline_generated' && data.events.length) {
      _tlData = data;
      renderFusedTimeline(data);
      switchView('fused');
      btnGenerate.textContent = 'Regenerate';
    } else if (data.status === 'processing') {
      btnGenerate.disabled = true;
      btnGenerate.textContent = 'Generating…';
      tlStatus.textContent = '⏳';
      startTlPoll();
    }
  } catch (_) { /* silent */ }
}

btnGenerate.addEventListener('click', runGenerate);

// Enable generate button once we have a session
function _enableGenerate() { if (sessionId) btnGenerate.disabled = false; }

boot();
</script>
