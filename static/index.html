<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1.25rem;
      height: 52px;
      background: #1a1a2e;
      color: #fff;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 1.1rem; letter-spacing: .04em; flex: 1; }
    #session-label { font-size: .78rem; color: #a0aec0; font-family: monospace; }
    #btn-new-session {
      background: #3b82f6; color: #fff; border: none;
      border-radius: 6px; padding: .4rem .9rem;
      font-size: .85rem; cursor: pointer; transition: background .15s;
    }
    #btn-new-session:hover { background: #2563eb; }
    #btn-new-session:disabled { background: #64748b; cursor: not-allowed; }

    /* ── Three-panel grid ── */
    #panels {
      display: grid;
      grid-template-columns: 240px 1fr 280px;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #d1d5db;
      overflow: hidden;
      background: #fff;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: .55rem 1rem;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      background: #f8fafc; border-bottom: 1px solid #e5e7eb;
      color: #6b7280; flex-shrink: 0;
    }

    .panel-body {
      flex: 1; overflow-y: auto; padding: 1rem;
    }

    .placeholder {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #9ca3af;
      font-size: .85rem; text-align: center; line-height: 1.6;
    }

    /* ── Coverage strip ── */
    #coverage-strip {
      display: flex; flex-wrap: wrap; gap: .35rem;
      padding: .5rem 1rem; border-bottom: 1px solid #e5e7eb;
      background: #f8fafc; flex-shrink: 0;
    }
    .pill {
      font-size: .65rem; font-weight: 600; letter-spacing: .04em;
      padding: .18rem .55rem; border-radius: 999px;
      text-transform: uppercase; transition: background .3s, color .3s;
    }
    .pill-uncovered { background: #e5e7eb; color: #6b7280; }
    .pill-partial    { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .pill-covered    { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

    /* ── Chat messages ── */
    #chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1rem; display: flex; flex-direction: column; gap: .75rem;
    }

    .msg {
      max-width: 80%; padding: .65rem .9rem;
      border-radius: 14px; font-size: .88rem; line-height: 1.5;
      word-break: break-word;
    }
    .msg-assistant {
      align-self: flex-start;
      background: #f1f5f9; color: #1e293b;
      border-bottom-left-radius: 4px;
    }
    .msg-user {
      align-self: flex-end;
      background: #3b82f6; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-system {
      align-self: center; font-size: .75rem;
      color: #94a3b8; font-style: italic;
    }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex; gap: .3rem; align-items: center;
      padding: .65rem .9rem;
    }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #94a3b8; animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    #chat-footer {
      border-top: 1px solid #e5e7eb; padding: .75rem 1rem;
      display: flex; flex-direction: column; gap: .5rem;
      flex-shrink: 0; background: #fff;
    }
    #chat-input-row { display: flex; gap: .5rem; }
    #chat-input {
      flex: 1; resize: none; border: 1px solid #d1d5db;
      border-radius: 8px; padding: .5rem .75rem;
      font-size: .88rem; font-family: inherit;
      line-height: 1.4; max-height: 120px; overflow-y: auto;
    }
    #chat-input:focus { outline: none; border-color: #3b82f6; }
    #chat-input:disabled { background: #f8fafc; }

    #btn-send {
      background: #3b82f6; color: #fff; border: none;
      border-radius: 8px; padding: .5rem .9rem;
      font-size: .85rem; cursor: pointer; align-self: flex-end;
      transition: background .15s; white-space: nowrap;
    }
    #btn-send:hover:not(:disabled) { background: #2563eb; }
    #btn-send:disabled { background: #93c5fd; cursor: not-allowed; }

    #btn-mic {
      background: #f1f5f9; border: 1px solid #d1d5db;
      border-radius: 8px; padding: .5rem .65rem;
      font-size: 1.05rem; cursor: pointer; align-self: flex-end;
      transition: background .15s, border-color .15s;
      line-height: 1;
    }
    #btn-mic:hover:not(:disabled) { background: #e2e8f0; border-color: #94a3b8; }
    #btn-mic:disabled { opacity: .4; cursor: not-allowed; }
    #btn-mic.recording {
      background: #fee2e2; border-color: #fca5a5; color: #dc2626;
      animation: pulse-mic .8s ease infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, .35); }
      50%       { box-shadow: 0 0 0 5px rgba(239, 68, 68, 0); }
    }

    #btn-end-interview {
      background: none; border: 1px solid #e5e7eb;
      color: #6b7280; border-radius: 6px; padding: .35rem .75rem;
      font-size: .78rem; cursor: pointer; align-self: flex-start;
      transition: border-color .15s, color .15s;
    }
    #btn-end-interview:hover:not(:disabled) { border-color: #94a3b8; color: #374151; }
    #btn-end-interview:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Complete banner ── */
    #complete-banner {
      display: none; margin: .5rem 0;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 8px; padding: .6rem 1rem;
      font-size: .82rem; color: #166534; text-align: center;
    }

    /* ── Generate button placeholder ── */
    #btn-generate-timeline {
      display: none; width: 100%;
      background: #1a1a2e; color: #fff; border: none;
      border-radius: 8px; padding: .65rem;
      font-size: .88rem; cursor: not-allowed; opacity: .5;
      /* PHASE 4: wire this up */
    }

    /* ── Documents panel ── */
    #doc-upload-area {
      padding: .6rem .75rem; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
    }
    #dropzone {
      border: 2px dashed #d1d5db; border-radius: 8px;
      padding: .55rem .5rem; text-align: center; cursor: pointer;
      font-size: .78rem; color: #6b7280;
      transition: border-color .2s, background .2s;
      line-height: 1.6;
    }
    #dropzone.over { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    .file-label { color: #3b82f6; cursor: pointer; text-decoration: underline; }

    #doc-list { flex: 1; overflow-y: auto; padding: .5rem; }

    .doc-item {
      display: flex; align-items: center; gap: .45rem;
      padding: .45rem .55rem; border-radius: 6px; cursor: pointer;
      border: 1px solid #e5e7eb; margin-bottom: .35rem;
      transition: background .15s; background: #fff;
    }
    .doc-item:hover { background: #f8fafc; }
    .doc-name {
      flex: 1; font-size: .78rem; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; color: #374151;
    }
    .doc-kind { font-size: .65rem; color: #94a3b8; flex-shrink: 0; }

    .status-chip {
      font-size: .68rem; font-weight: 700;
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chip-pending   { background: #f1f5f9; color: #64748b; animation: spin-chip 1.5s linear infinite; }
    .chip-done      { background: #dcfce7; color: #166534; }
    .chip-unreadable{ background: #fef9c3; color: #854d0e; }
    .chip-error     { background: #fee2e2; color: #991b1b; }
    @keyframes spin-chip { to { transform: rotate(360deg); } }

    .doc-reupload {
      background: none; border: none; color: #94a3b8;
      cursor: pointer; font-size: .85rem; padding: 0 .15rem; flex-shrink: 0;
    }
    .doc-reupload:hover { color: #3b82f6; }
    .doc-empty {
      text-align: center; color: #9ca3af; font-size: .8rem; padding: 1.5rem .5rem;
    }

    /* ── Audit modal ── */
    .modal {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
    }
    .modal.hidden { display: none; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
    .modal-box {
      position: relative; background: #fff; border-radius: 12px;
      width: min(90vw, 680px); max-height: 82vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .modal-header {
      display: flex; align-items: center; gap: .5rem;
      padding: .75rem 1rem; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
    }
    #audit-title {
      flex: 1; font-size: .92rem; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #audit-close {
      background: none; border: none; font-size: 1.3rem;
      cursor: pointer; color: #6b7280; line-height: 1; padding: 0 .2rem;
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 1rem; }
    .audit-status-row { margin-bottom: .6rem; font-size: .82rem; color: #374151; }
    .audit-warnings {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px;
      padding: .5rem .75rem; margin-bottom: .7rem; font-size: .78rem; color: #92400e;
    }
    .warn-item + .warn-item { margin-top: .2rem; }
    .audit-section-title {
      font-size: .7rem; font-weight: 700; color: #6b7280;
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: .3rem;
    }
    .audit-text {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
      padding: .65rem .75rem; font-size: .76rem; font-family: monospace;
      white-space: pre-wrap; word-break: break-word;
      max-height: 280px; overflow-y: auto; margin-bottom: .8rem;
    }
    .audit-meta {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
      padding: .65rem .75rem; font-size: .72rem; font-family: monospace;
      white-space: pre-wrap; max-height: 180px; overflow-y: auto;
    }

    /* ── Timeline / events panel ── */
    .panel-header-sub { font-weight: 400; opacity: .6; font-size: .75em; }

    #tl-toolbar {
      display: flex; align-items: center; gap: .6rem;
      padding: .55rem .75rem; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
    }
    #btn-extract {
      background: #1a1a2e; color: #fff; border: none;
      border-radius: 6px; padding: .35rem .8rem;
      font-size: .8rem; cursor: pointer; transition: background .15s;
    }
    #btn-extract:hover:not(:disabled) { background: #2d2d4e; }
    #btn-extract:disabled { background: #64748b; cursor: not-allowed; }
    #tl-count { font-size: .75rem; color: #94a3b8; }

    #events-list { flex: 1; overflow-y: auto; padding: .5rem .6rem; }

    .year-group { margin-bottom: .75rem; }
    .year-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: #6b7280;
      padding: .2rem .2rem .3rem; border-bottom: 1px solid #e5e7eb;
      margin-bottom: .4rem;
    }
    .event-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: .5rem .65rem; margin-bottom: .35rem;
      cursor: default; transition: background .1s;
    }
    .event-card:hover { background: #f8fafc; }
    .event-card-top { display: flex; align-items: flex-start; gap: .4rem; }
    .event-badge {
      font-size: .6rem; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; padding: .15rem .45rem;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-Diagnosis      { background: #fee2e2; color: #991b1b; }
    .badge-Medication     { background: #dbeafe; color: #1e40af; }
    .badge-LabResult      { background: #dcfce7; color: #166534; }
    .badge-Surgery        { background: #fef3c7; color: #92400e; }
    .badge-Hospitalization{ background: #ede9fe; color: #5b21b6; }
    .badge-Symptom        { background: #fef9c3; color: #854d0e; }
    .badge-Consultation   { background: #f1f5f9; color: #475569; }

    .event-desc { font-size: .8rem; color: #1e293b; flex: 1; line-height: 1.4; }
    .event-meta { display: flex; gap: .5rem; margin-top: .25rem; align-items: center; }
    .event-date { font-size: .7rem; color: #64748b; }
    .event-date.vague { color: #f59e0b; }
    .event-src  { font-size: .65rem; color: #94a3b8; margin-left: auto; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.25rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: #f8fafc;
      padding: .5rem 1.2rem; border-radius: 8px;
      font-size: .82rem; transition: transform .25s ease;
      pointer-events: none; z-index: 100;
    }
    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.error { background: #dc2626; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>MediTrace</h1>
  <span id="session-label">Starting session…</span>
  <button id="btn-new-session">New Session</button>
</div>

<div id="panels">
  <!-- LEFT: Documents -->
  <div class="panel" id="panel-docs">
    <div class="panel-header">Documents</div>
    <div id="doc-upload-area">
      <div id="dropzone">
        <div>📎 Drop PDF or image here</div>
        <div>or <label for="file-input" class="file-label">browse files</label></div>
        <input type="file" id="file-input" accept=".pdf,image/*" multiple hidden>
      </div>
    </div>
    <div id="doc-list">
      <div class="doc-empty">No documents yet.</div>
    </div>
  </div>

  <!-- CENTER: Interview -->
  <div class="panel" id="panel-interview">
    <div class="panel-header">Interview</div>

    <div id="coverage-strip">
      <!-- filled by JS -->
    </div>

    <div id="chat-messages">
      <!-- messages appended here -->
    </div>

    <div id="chat-footer">
      <div id="complete-banner">
        Interview complete — all topics covered.
      </div>
      <button id="btn-generate-timeline">Generate Timeline (Phase 4)</button>
      <div id="chat-input-row">
        <textarea id="chat-input" rows="2" placeholder="Type your response…"></textarea>
        <button id="btn-mic" title="Click to record">🎤</button>
        <button id="btn-send">Send</button>
      </div>
      <button id="btn-end-interview">End interview early</button>
    </div>
  </div>

  <!-- RIGHT: Raw events (pre-fusion) -->
  <div class="panel" id="panel-timeline">
    <div class="panel-header">
      Raw events <span class="panel-header-sub">(pre-fusion)</span>
    </div>
    <div id="tl-toolbar">
      <button id="btn-extract">Extract events</button>
      <span id="tl-count"></span>
    </div>
    <div id="events-list">
      <div class="placeholder">Run "Extract events" after the interview or uploading documents.</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Audit modal -->
<div id="audit-modal" class="modal hidden">
  <div class="modal-backdrop" id="audit-backdrop"></div>
  <div class="modal-box">
    <div class="modal-header">
      <span id="audit-title"></span>
      <button id="audit-close">×</button>
    </div>
    <div class="modal-body" id="audit-body"></div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────
const TOPIC_LABELS = {
  chief_complaint:    'Chief complaint',
  chronic_conditions: 'Chronic',
  medications:        'Medications',
  surgeries:          'Surgeries',
  hospitalizations:   'Hospitalizations',
  allergies:          'Allergies',
  family_history:     'Family history',
};

// ── State ──────────────────────────────────────────────────
let sessionId = null;
let interviewDone = false;
let mediaRecorder = null;
let audioChunks = [];

// ── DOM refs ───────────────────────────────────────────────
const chatMessages   = document.getElementById('chat-messages');
const chatInput      = document.getElementById('chat-input');
const btnSend        = document.getElementById('btn-send');
const btnMic         = document.getElementById('btn-mic');
const btnEnd         = document.getElementById('btn-end-interview');
const btnNew         = document.getElementById('btn-new-session');
const sessionLabel   = document.getElementById('session-label');
const coverageStrip  = document.getElementById('coverage-strip');
const completeBanner = document.getElementById('complete-banner');
const btnGenTimeline = document.getElementById('btn-generate-timeline');
const toast          = document.getElementById('toast');

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = isError ? 'show error' : 'show';
  toastTimer = setTimeout(() => { toast.className = ''; }, 3500);
}

// ── Coverage strip ─────────────────────────────────────────
function renderCoverage(coverageMap) {
  coverageStrip.innerHTML = '';
  for (const [topic, status] of Object.entries(coverageMap)) {
    const pill = document.createElement('span');
    pill.className = `pill pill-${status}`;
    pill.title = `${TOPIC_LABELS[topic] ?? topic}: ${status}`;
    pill.textContent = TOPIC_LABELS[topic] ?? topic;
    coverageStrip.appendChild(pill);
  }
}

function initCoverageStrip() {
  const empty = {};
  for (const k of Object.keys(TOPIC_LABELS)) empty[k] = 'uncovered';
  renderCoverage(empty);
}

// ── Chat helpers ───────────────────────────────────────────
function appendMessage(role, text) {
  // Remove typing indicator if present
  const existing = chatMessages.querySelector('.typing-indicator');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function appendSystem(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'typing-indicator msg-assistant';
  wrap.style.alignSelf = 'flex-start';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(dots);
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ── Disable / enable input ─────────────────────────────────
function setInputEnabled(enabled) {
  chatInput.disabled = !enabled;
  btnSend.disabled   = !enabled;
  btnEnd.disabled    = !enabled;
  btnMic.disabled    = !enabled;
}

// ── Interview complete state ───────────────────────────────
function markInterviewComplete() {
  interviewDone = true;
  setInputEnabled(false);
  btnMic.disabled = true;
  completeBanner.style.display = 'block';
  btnGenTimeline.style.display = 'block';
  appendSystem('— Interview complete —');
}

// ── Voice recording ────────────────────────────────────────
async function startRecording() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    showToast('Microphone access denied — use the text input instead.', true);
    return;
  }

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    stream.getTracks().forEach(t => t.stop());
    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(audioChunks, { type: mimeType });
    sendVoiceTurn(blob, mimeType);
  };

  mediaRecorder.start();
  btnMic.classList.add('recording');
  btnMic.textContent = '⏹';
  btnMic.title = 'Click to stop recording';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  btnMic.classList.remove('recording');
  btnMic.textContent = '🎤';
  btnMic.title = 'Click to record';
}

async function sendVoiceTurn(blob, mimeType) {
  if (interviewDone || !sessionId) return;

  setInputEnabled(false);

  // Show transcribing indicator
  const transcribingEl = document.createElement('div');
  transcribingEl.className = 'msg msg-system';
  transcribingEl.textContent = 'Transcribing…';
  chatMessages.appendChild(transcribingEl);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  const formData = new FormData();
  formData.append('audio', blob, 'recording.webm');

  try {
    const res = await fetch(`/api/sessions/${sessionId}/interview/voice-turn`, {
      method: 'POST',
      body: formData,
    });

    transcribingEl.remove();

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({ detail: 'Unknown error' }));
      showToast(
        res.status === 422
          ? "Couldn't hear that — try again or type your answer."
          : (errBody.detail ?? `HTTP ${res.status}`),
        true
      );
      return;
    }

    const data = await res.json();
    appendMessage('user', data.transcript);
    appendMessage('assistant', data.reply);
    renderCoverage(data.coverage);

    if (data.interview_complete) {
      await callComplete().catch(() => {});
      markInterviewComplete();
    }
  } catch (err) {
    transcribingEl.remove();
    showToast("Couldn't hear that — try again or type your answer.", true);
  } finally {
    if (!interviewDone) {
      setInputEnabled(true);
      chatInput.focus();
    }
  }
}

btnMic.addEventListener('click', () => {
  if (interviewDone || !sessionId) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    startRecording();
  }
});

// ── API calls ──────────────────────────────────────────────
async function createSession() {
  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({}),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function sendTurn(message) {
  const res = await fetch(`/api/sessions/${sessionId}/interview/turn`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
    throw new Error(err.detail ?? `HTTP ${res.status}`);
  }
  return res.json();
}

async function callComplete() {
  const res = await fetch(`/api/sessions/${sessionId}/interview/complete`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
  });
  if (!res.ok && res.status !== 409) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Main turn handler ──────────────────────────────────────
async function doTurn(userMessage) {
  if (interviewDone || !sessionId) return;

  setInputEnabled(false);

  if (userMessage) {
    appendMessage('user', userMessage);
  }

  showTyping();

  try {
    const data = await sendTurn(userMessage);
    appendMessage('assistant', data.reply);
    renderCoverage(data.coverage);

    if (data.interview_complete) {
      await callComplete().catch(() => {});
      markInterviewComplete();
    }
  } catch (err) {
    // Remove typing indicator on error
    const indicator = chatMessages.querySelector('.typing-indicator');
    if (indicator) indicator.remove();
    appendSystem('The assistant had trouble — please try again.');
    showToast(err.message, true);
  } finally {
    if (!interviewDone) {
      setInputEnabled(true);
      chatInput.focus();
    }
  }
}

// ── Send button / enter key ────────────────────────────────
btnSend.addEventListener('click', () => {
  const msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';
  doTurn(msg);
});

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    btnSend.click();
  }
});

// ── End interview early ────────────────────────────────────
btnEnd.addEventListener('click', async () => {
  if (interviewDone || !sessionId) return;
  setInputEnabled(false);
  try {
    await callComplete();
    markInterviewComplete();
    showToast('Interview ended early.');
  } catch (err) {
    setInputEnabled(true);
    showToast(err.message, true);
  }
});

// ── URL param helpers ──────────────────────────────────────
function getSessionParam() {
  return new URLSearchParams(location.search).get('session');
}

function setSessionParam(id) {
  history.replaceState(null, '', '?session=' + id);
}

// ── New session button ─────────────────────────────────────
btnNew.addEventListener('click', async () => {
  if (!confirm('Start a new session? The current session stays in the database.')) return;
  btnNew.disabled = true;
  try {
    const session = await createSession();
    // Navigate to the new session URL — page reload gives a clean state
    location.href = '?session=' + session.id;
  } catch (err) {
    showToast(err.message, true);
    btnNew.disabled = false;
  }
});

// ── Rehydrate an existing session ─────────────────────────
async function rehydrate(id) {
  const res = await fetch(`/api/sessions/${id}`);
  if (!res.ok) throw new Error(`Session ${id} not found (HTTP ${res.status})`);
  const session = await res.json();

  sessionId = session.id;
  sessionLabel.textContent = `Session: ${session.id.slice(0, 8)}…`;
  sessionLabel.title = session.id;

  // Restore coverage pills
  const coverage = session.interview_state?.coverage_map;
  if (coverage && Object.keys(coverage).length) renderCoverage(coverage);
  else initCoverageStrip();

  // Restore docs + events
  refreshDocList();
  loadEvents();

  // Replay transcript into chat
  for (const turn of (session.transcript || [])) {
    appendMessage(turn.role, turn.content);
  }

  // Restore complete state if applicable
  const doneStatuses = ['interview_complete', 'processing', 'timeline_generated'];
  if (doneStatuses.includes(session.status)) {
    markInterviewComplete();
    return;
  }

  // If transcript is empty this is a fresh session — fire opening turn
  if (!session.transcript || session.transcript.length === 0) {
    await doTurn('');
  } else {
    setInputEnabled(true);
    chatInput.focus();
  }
}

// ── Boot ───────────────────────────────────────────────────
async function boot() {
  initCoverageStrip();
  setInputEnabled(false);

  const existingId = getSessionParam();

  if (existingId) {
    try {
      await rehydrate(existingId);
    } catch (err) {
      // Bad/expired ID — fall through and create a fresh session
      appendSystem('Could not load session — starting a new one.');
      showToast(err.message, true);
      await startFreshSession();
    }
  } else {
    await startFreshSession();
  }
}

async function startFreshSession() {
  try {
    const session = await createSession();
    sessionId = session.id;
    sessionLabel.textContent = `Session: ${session.id.slice(0, 8)}…`;
    sessionLabel.title = session.id;
    setSessionParam(session.id);
    refreshDocList();
    loadEvents();
    await doTurn('');
  } catch (err) {
    appendSystem('Failed to start session. Check the server and refresh.');
    showToast(err.message, true);
    sessionLabel.textContent = 'Error';
  }
}

// ── Document panel ─────────────────────────────────────────
const dropzone  = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const docList   = document.getElementById('doc-list');
const auditModal   = document.getElementById('audit-modal');
const auditBackdrop = document.getElementById('audit-backdrop');
const auditClose   = document.getElementById('audit-close');
const auditTitle   = document.getElementById('audit-title');
const auditBody    = document.getElementById('audit-body');

let pollTimer = null;

// Status chip factory
function makeChip(status) {
  const chip = document.createElement('span');
  chip.className = `status-chip chip-${status}`;
  chip.title = status;
  chip.textContent = { pending: '⏳', done: '✓', unreadable: '⚠', error: '✗' }[status] ?? status;
  return chip;
}

// Render the document list
function renderDocList(docs) {
  docList.innerHTML = '';
  if (!docs.length) {
    docList.innerHTML = '<div class="doc-empty">No documents yet.</div>';
    return;
  }
  for (const doc of docs) {
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.dataset.status = doc.ocr_status;

    item.appendChild(makeChip(doc.ocr_status));

    const name = document.createElement('span');
    name.className = 'doc-name';
    name.textContent = doc.filename || doc.kind;
    name.title = doc.filename || '';
    item.appendChild(name);

    const kind = document.createElement('span');
    kind.className = 'doc-kind';
    kind.textContent = doc.kind === 'pdf_typed' ? 'PDF' : 'IMG';
    item.appendChild(kind);

    if (doc.ocr_status === 'error' || doc.ocr_status === 'unreadable') {
      const reup = document.createElement('button');
      reup.className = 'doc-reupload';
      reup.title = 'Re-upload';
      reup.textContent = '↑';
      reup.onclick = (e) => { e.stopPropagation(); fileInput.click(); };
      item.appendChild(reup);
    }

    item.addEventListener('click', () => openAudit(doc.source_id));
    docList.appendChild(item);
  }
}

// Fetch doc list and update UI; start polling if any pending
async function refreshDocList() {
  if (!sessionId) return;
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents`);
    if (!res.ok) return;
    const docs = await res.json();
    renderDocList(docs);
    if (docs.some(d => d.ocr_status === 'pending')) startPolling();
  } catch (_) { /* silent */ }
}

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    if (!sessionId) return;
    const res = await fetch(`/api/sessions/${sessionId}/documents`).catch(() => null);
    if (!res?.ok) return;
    const docs = await res.json();
    renderDocList(docs);
    if (!docs.some(d => d.ocr_status === 'pending')) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }, 2000);
}

// Upload a single file
async function handleUpload(file) {
  if (!sessionId) { showToast('Start a session first.', true); return; }
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents`, {
      method: 'POST', body: form,
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${res.status}`);
    }
    await refreshDocList();
    startPolling();
  } catch (err) {
    showToast(`Upload failed: ${err.message}`, true);
  }
}

// Audit modal
async function openAudit(sourceId) {
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents/${sourceId}`);
    if (!res.ok) return;
    const data = await res.json();

    auditTitle.textContent = data.filename || data.kind;
    auditBody.innerHTML = '';

    // Status row
    const statusRow = document.createElement('div');
    statusRow.className = 'audit-status-row';
    statusRow.innerHTML = `Status: <strong>${data.ocr_status}</strong>`;
    auditBody.appendChild(statusRow);

    // Warnings
    const warnings = data.extraction_meta?.warnings || [];
    if (warnings.length) {
      const warnBox = document.createElement('div');
      warnBox.className = 'audit-warnings';
      warnBox.innerHTML = warnings.map(w => `<div class="warn-item">⚠ ${w}</div>`).join('');
      auditBody.appendChild(warnBox);
    }

    // Extracted text
    if (data.extracted_text) {
      const t = document.createElement('div');
      t.className = 'audit-section-title';
      t.textContent = 'Extracted Text';
      auditBody.appendChild(t);
      const pre = document.createElement('pre');
      pre.className = 'audit-text';
      pre.textContent = data.extracted_text;
      auditBody.appendChild(pre);
    }

    // Structured meta (filtered — hide model/page_count/warnings already shown)
    const metaKeys = Object.keys(data.extraction_meta).filter(
      k => !['warnings', 'model', 'page_count'].includes(k)
    );
    if (metaKeys.length) {
      const mt = document.createElement('div');
      mt.className = 'audit-section-title';
      mt.textContent = 'Structured Fields';
      auditBody.appendChild(mt);
      const filtered = Object.fromEntries(metaKeys.map(k => [k, data.extraction_meta[k]]));
      const pre = document.createElement('pre');
      pre.className = 'audit-meta';
      pre.textContent = JSON.stringify(filtered, null, 2);
      auditBody.appendChild(pre);
    }

    auditModal.classList.remove('hidden');
  } catch (_) { /* silent */ }
}

function closeAudit() { auditModal.classList.add('hidden'); }
auditClose.addEventListener('click', closeAudit);
auditBackdrop.addEventListener('click', closeAudit);

// Drag-and-drop
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', async (e) => {
  e.preventDefault();
  dropzone.classList.remove('over');
  for (const f of Array.from(e.dataTransfer.files)) await handleUpload(f);
});

// File picker
fileInput.addEventListener('change', async (e) => {
  for (const f of Array.from(e.target.files)) await handleUpload(f);
  e.target.value = '';
});

// Clicking anywhere on the dropzone that isn't the label triggers file picker
dropzone.addEventListener('click', (e) => {
  if (e.target.tagName !== 'LABEL') fileInput.click();
});

// ── Timeline / events panel ────────────────────────────────
const btnExtract = document.getElementById('btn-extract');
const eventsList = document.getElementById('events-list');
const tlCount    = document.getElementById('tl-count');

const TYPE_LABELS = {
  Diagnosis: 'Diagnosis', Medication: 'Medication', LabResult: 'Lab Result',
  Surgery: 'Surgery', Hospitalization: 'Hospitalization',
  Symptom: 'Symptom', Consultation: 'Consultation',
};

function formatEventDate(ev) {
  const vague = ev.date_confidence < 0.5;
  let label = '';
  if (ev.date_start) {
    const d = new Date(ev.date_start + 'T00:00:00');
    const opts = ev.date_precision === 'exact'
      ? { day: 'numeric', month: 'short', year: 'numeric' }
      : ev.date_precision === 'month'
        ? { month: 'short', year: 'numeric' }
        : { year: 'numeric' };
    label = d.toLocaleDateString('en-IN', opts);
    if (vague) label = '~ ' + label;
  } else if (ev.date_raw) {
    label = '~ ' + ev.date_raw;
  } else {
    label = 'Unknown date';
  }
  return { label, vague };
}

function yearOf(ev) {
  if (ev.date_start) return new Date(ev.date_start + 'T00:00:00').getFullYear();
  return null;
}

function renderEvents(events) {
  eventsList.innerHTML = '';
  if (!events.length) {
    eventsList.innerHTML = '<div class="doc-empty">No events extracted yet.</div>';
    tlCount.textContent = '';
    return;
  }

  tlCount.textContent = `${events.length} event${events.length !== 1 ? 's' : ''}`;

  // Group by year (null → "Unknown date")
  const groups = new Map();
  for (const ev of events) {
    const yr = yearOf(ev) ?? '?';
    if (!groups.has(yr)) groups.set(yr, []);
    groups.get(yr).push(ev);
  }

  // Sort years: numeric ascending, '?' at end
  const sortedYears = [...groups.keys()].sort((a, b) => {
    if (a === '?' && b === '?') return 0;
    if (a === '?') return 1;
    if (b === '?') return -1;
    return a - b;
  });

  for (const yr of sortedYears) {
    const grp = document.createElement('div');
    grp.className = 'year-group';

    const lbl = document.createElement('div');
    lbl.className = 'year-label';
    lbl.textContent = yr === '?' ? 'Date unknown' : yr;
    grp.appendChild(lbl);

    for (const ev of groups.get(yr)) {
      const card = document.createElement('div');
      card.className = 'event-card';

      const top = document.createElement('div');
      top.className = 'event-card-top';

      const badge = document.createElement('span');
      badge.className = `event-badge badge-${ev.event_type}`;
      badge.textContent = TYPE_LABELS[ev.event_type] ?? ev.event_type;

      const desc = document.createElement('div');
      desc.className = 'event-desc';
      desc.textContent = ev.description;

      top.appendChild(badge);
      top.appendChild(desc);
      card.appendChild(top);

      const meta = document.createElement('div');
      meta.className = 'event-meta';

      const { label, vague } = formatEventDate(ev);
      const dateEl = document.createElement('span');
      dateEl.className = 'event-date' + (vague ? ' vague' : '');
      dateEl.textContent = label;
      meta.appendChild(dateEl);

      if (ev.source_id) {
        const srcEl = document.createElement('span');
        srcEl.className = 'event-src';
        srcEl.textContent = '📄 doc';
        srcEl.title = ev.source_id;
        meta.appendChild(srcEl);
      } else {
        const srcEl = document.createElement('span');
        srcEl.className = 'event-src';
        srcEl.textContent = '💬 interview';
        meta.appendChild(srcEl);
      }

      card.appendChild(meta);
      grp.appendChild(card);
    }
    eventsList.appendChild(grp);
  }
}

async function runExtract() {
  if (!sessionId) return;
  btnExtract.disabled = true;
  btnExtract.textContent = 'Extracting…';
  try {
    const r1 = await fetch(`/api/sessions/${sessionId}/events/extract`, { method: 'POST' });
    if (!r1.ok) {
      const e = await r1.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${r1.status}`);
    }
    const summary = await r1.json();
    const r2 = await fetch(`/api/sessions/${sessionId}/events`);
    const events = await r2.json();
    renderEvents(events);
    showToast(`Extracted ${summary.total} event${summary.total !== 1 ? 's' : ''}`);
  } catch (err) {
    showToast(`Extraction failed: ${err.message}`, true);
  } finally {
    btnExtract.disabled = false;
    btnExtract.textContent = 'Extract events';
  }
}

async function loadEvents() {
  if (!sessionId) return;
  try {
    const r = await fetch(`/api/sessions/${sessionId}/events`);
    if (!r.ok) return;
    const events = await r.json();
    if (events.length) renderEvents(events);
  } catch (_) { /* silent */ }
}

btnExtract.addEventListener('click', runExtract);

boot();
</script>
