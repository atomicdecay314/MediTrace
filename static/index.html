<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediTrace</title>
  <!-- Inter typeface — Stitch reference font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens — dark theme (default) ──────────────────────────── */
    :root {
      --bg:              #09090b;
      --surface:         #131315;
      --surface-card:    #18181b;
      --surface-raised:  #201f22;
      --surface-high:    #2a2a2c;
      --surface-highest: #353437;
      --border:          #27272a;
      --border-active:   #424754;
      --text:            #e5e1e4;
      --text-muted:      #c2c6d6;
      --text-subtle:     #8c909f;
      --primary:         #adc6ff;   /* accent blue */
      --primary-on:      #002e6a;
      --primary-dim:     rgba(173,198,255,.12);
      --primary-border:  rgba(173,198,255,.25);
      /* Amber — sole warning/attention: vague dates, conflicts, mid-confidence */
      --amber:           #fbbf24;
      --amber-dim:       rgba(251,191,36,.12);
      --amber-border:    rgba(251,191,36,.30);
      /* Semantic colours — sweeping out hardcoded literals */
      --green:           #6ee7b7;   /* resolved / processed / done */
      --green-dim:       rgba(52,211,153,.15);
      --red:             #f87171;   /* error / low-confidence */
      --red-dim:         rgba(239,68,68,.12);
      --red-border:      rgba(239,68,68,.9);
      /* Event-type badge colours */
      --badge-dx-bg:     rgba(239,68,68,.15);   --badge-dx-fg:    #f87171;
      --badge-med-bg:    rgba(96,165,250,.15);   --badge-med-fg:   #93c5fd;
      --badge-lab-bg:    rgba(52,211,153,.15);   --badge-lab-fg:   #6ee7b7;
      --badge-surg-bg:   rgba(251,191,36,.15);   --badge-surg-fg:  #fcd34d;
      --badge-hosp-bg:   rgba(167,139,250,.15);  --badge-hosp-fg:  #c4b5fd;
      --badge-symp-bg:   rgba(253,224,71,.15);   --badge-symp-fg:  #fde68a;
      --badge-cons-bg:   rgba(148,163,184,.15);  --badge-cons-fg:  #94a3b8;
      /* Modal backdrop */
      --backdrop:        rgba(0,0,0,.65);
      /* Toast error */
      --toast-err-bg:    rgba(239,68,68,.9);
      --toast-err-fg:    #ffffff;
    }

    /* ── Light theme palette ────────────────────────────────────────────── */
    /* Clean clinical light palette — NOT a naive inversion.                  */
    /* Amber is deepened to #d97706 so conflict cards remain strong on white. */
    /* Primary deepened to #1d4ed8 for WCAG-safe contrast on white surfaces.  */
    [data-theme="light"] {
      --bg:              #f0f4f8;
      --surface:         #ffffff;
      --surface-card:    #f8fafc;
      --surface-raised:  #f1f5f9;
      --surface-high:    #e2e8f0;
      --surface-highest: #cbd5e1;
      --border:          #e2e8f0;
      --border-active:   #94a3b8;
      --text:            #0f172a;
      --text-muted:      #334155;
      --text-subtle:     #64748b;
      --primary:         #1d4ed8;   /* deepened for contrast on white */
      --primary-on:      #ffffff;
      --primary-dim:     rgba(29,78,216,.08);
      --primary-border:  rgba(29,78,216,.22);
      /* Amber deepened: most critical legibility requirement in this phase.    */
      /* #d97706 (amber-700) reads strongly on white; dim keeps tinted fill.   */
      --amber:           #d97706;
      --amber-dim:       rgba(217,119,6,.10);
      --amber-border:    rgba(217,119,6,.35);
      --green:           #059669;
      --green-dim:       rgba(5,150,105,.12);
      --red:             #dc2626;
      --red-dim:         rgba(220,38,38,.10);
      --red-border:      rgba(220,38,38,.85);
      --badge-dx-bg:     rgba(220,38,38,.10);   --badge-dx-fg:    #b91c1c;
      --badge-med-bg:    rgba(29,78,216,.10);    --badge-med-fg:   #1d4ed8;
      --badge-lab-bg:    rgba(5,150,105,.10);    --badge-lab-fg:   #047857;
      --badge-surg-bg:   rgba(217,119,6,.10);    --badge-surg-fg:  #b45309;
      --badge-hosp-bg:   rgba(109,40,217,.10);   --badge-hosp-fg:  #6d28d9;
      --badge-symp-bg:   rgba(161,98,7,.10);     --badge-symp-fg:  #92400e;
      --badge-cons-bg:   rgba(71,85,105,.10);    --badge-cons-fg:  #475569;
      --backdrop:        rgba(0,0,0,.4);
      --toast-err-bg:    rgba(220,38,38,.9);
      --toast-err-fg:    #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Thin dark scrollbars (matching reference) ─────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    *::-webkit-scrollbar { width: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Top bar ── */
    #topbar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.25rem; height: 56px;
      background: var(--surface); color: var(--text);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #topbar h1 { font-size: 1rem; font-weight: 700; letter-spacing: -.01em; flex: 1; color: var(--primary); }
    #session-label { font-size: .72rem; color: var(--text-subtle); font-family: ui-monospace, 'JetBrains Mono', monospace; }
    /* ── Theme toggle (sun ↔ moon morph) ── */
    #btn-theme {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      width: 34px; height: 34px; cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-subtle); transition: border-color .2s, color .2s;
      overflow: hidden; flex-shrink: 0;
    }
    #btn-theme:hover { border-color: var(--border-active); color: var(--text); }
    #icon-sun, #icon-moon {
      position: absolute; transition: transform .35s ease, opacity .35s ease;
    }
    /* Dark mode default: show sun (offer switch to light), hide moon */
    :root #icon-sun  { transform: rotate(0deg)  scale(1);   opacity: 1; }
    :root #icon-moon { transform: rotate(90deg) scale(.5);  opacity: 0; }
    /* Light mode: show moon (offer switch to dark), hide sun */
    [data-theme="light"] #icon-sun  { transform: rotate(-90deg) scale(.5); opacity: 0; }
    [data-theme="light"] #icon-moon { transform: rotate(0deg)   scale(1);  opacity: 1; }

    #btn-new-session {
      background: var(--primary); color: var(--primary-on); border: none;
      border-radius: 20px; padding: .35rem .9rem;
      font-size: .78rem; font-weight: 700; cursor: pointer; transition: opacity .15s;
    }
    #btn-new-session:hover { opacity: .85; }
    #btn-new-session:disabled { background: var(--surface-high); color: var(--text-subtle); cursor: not-allowed; }

    /* ── Patients button (Phase 8) ── */
    #btn-patients {
      background: none; border: 1px solid var(--border); border-radius: 20px;
      padding: .35rem .9rem; font-size: .78rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: border-color .2s, color .2s;
    }
    #btn-patients:hover { border-color: var(--border-active); color: var(--text); }

    /* ── Phase 8: New-session form modal ── */
    #np-modal .modal-box { width: min(90vw, 380px); }
    .np-field { margin-bottom: .85rem; }
    .np-field label {
      display: block; font-size: .72rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: .3rem;
    }
    .np-required { color: var(--red); }
    .np-field input, .np-field select {
      width: 100%; padding: .45rem .65rem;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 7px;
      font-size: .88rem; font-family: inherit;
    }
    .np-field input:focus, .np-field select:focus {
      outline: none; border-color: var(--primary);
    }
    .np-field input::placeholder { color: var(--text-subtle); }
    .np-actions {
      display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1rem;
    }
    .np-btn-cancel {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      padding: .42rem .85rem; font-size: .82rem; font-family: inherit;
      color: var(--text-muted); cursor: pointer;
    }
    .np-btn-cancel:hover { border-color: var(--border-active); color: var(--text); }
    .np-btn-submit {
      background: var(--primary); color: var(--primary-on); border: none;
      border-radius: 7px; padding: .42rem .9rem;
      font-size: .82rem; font-weight: 700; font-family: inherit; cursor: pointer;
      transition: opacity .15s;
    }
    .np-btn-submit:hover { opacity: .85; }
    .np-btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Phase 8: Patients list modal ── */
    #pts-modal .modal-box { width: min(90vw, 460px); }
    .pts-empty { color: var(--text-subtle); font-size: .85rem; padding: .5rem 0; }
    .pt-row {
      display: flex; align-items: center; gap: .6rem;
      padding: .6rem .65rem; border-radius: 8px; margin-bottom: .35rem;
      background: var(--surface-raised); border: 1px solid var(--border);
      transition: background .12s, border-color .12s;
    }
    .pt-row-clickable {
      cursor: pointer;
    }
    .pt-row-clickable:hover  { background: var(--surface-high); border-color: var(--border-active); }
    .pt-row-clickable:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    .pt-info { flex: 1; min-width: 0; }
    .pt-name { font-size: .85rem; font-weight: 600; color: var(--text); display: block; }
    .pt-meta { font-size: .72rem; color: var(--text-subtle); display: block; margin-top: .05rem; }
    .pt-resume-hint {
      font-size: .68rem; color: var(--primary); white-space: nowrap; flex-shrink: 0;
    }
    .pt-no-session { font-size: .68rem; color: var(--text-subtle); flex-shrink: 0; }

    /* ── Three-panel grid (reference: 1/4 · flex-1 · 1/4, outer padding+gap) ── */
    #panels {
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      flex: 1; overflow: hidden;
      background: var(--bg);
      padding: .75rem; gap: .75rem;
    }

    .panel {
      display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .panel-header {
      padding: .6rem 1rem;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      background: var(--surface); border-bottom: 1px solid var(--border);
      color: var(--text-subtle); flex-shrink: 0;
    }

    .panel-body { flex: 1; overflow-y: auto; padding: 1rem; }

    .placeholder {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text-subtle);
      font-size: .82rem; text-align: center; line-height: 1.6;
    }

    /* ── Coverage strip ── */
    #coverage-strip {
      display: flex; flex-wrap: wrap; gap: .3rem;
      padding: .5rem 1rem; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .pill {
      font-size: .62rem; font-weight: 600; letter-spacing: .05em;
      padding: .18rem .55rem; border-radius: 999px;
      text-transform: uppercase; transition: background .3s, color .3s;
    }
    .pill-uncovered { background: var(--surface-high); color: var(--text-subtle); }
    .pill-partial   { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
    .pill-covered   { background: var(--primary-dim); color: var(--primary); border: 1px solid var(--primary-border); }

    /* ── Chat messages ── */
    #chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1rem; display: flex; flex-direction: column; gap: .75rem;
      background: var(--surface-card);
    }

    .msg {
      max-width: 80%; padding: .65rem .9rem;
      border-radius: 14px; font-size: .88rem; line-height: 1.5;
      word-break: break-word;
    }
    .msg-assistant {
      align-self: flex-start;
      background: var(--surface-raised); color: var(--text);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .msg-user {
      align-self: flex-end;
      background: var(--primary-dim); color: var(--text);
      border: 1px solid var(--primary-border); border-bottom-right-radius: 4px;
    }
    .msg-system {
      align-self: center; font-size: .75rem;
      color: var(--text-subtle); font-style: italic;
    }

    /* ── Typing indicator ── */
    .typing-dots {
      display: flex; gap: .3rem; align-items: center; padding: .65rem .9rem;
    }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-subtle); animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    #chat-footer {
      border-top: 1px solid var(--border); padding: .75rem 1rem;
      display: flex; flex-direction: column; gap: .5rem;
      flex-shrink: 0; background: var(--surface);
    }
    #chat-input-row { display: flex; gap: .5rem; }
    #chat-input {
      flex: 1; resize: none;
      border: 1px solid var(--border); border-radius: 8px;
      padding: .5rem .75rem; font-size: .88rem; font-family: inherit;
      line-height: 1.4; max-height: 120px; overflow-y: auto;
      background: var(--bg); color: var(--text);
    }
    #chat-input::placeholder { color: var(--text-subtle); }
    #chat-input:focus { outline: none; border-color: var(--primary); }
    #chat-input:disabled { background: var(--surface-raised); color: var(--text-subtle); }

    #btn-send {
      background: var(--primary); color: var(--primary-on); border: none;
      border-radius: 8px; padding: .5rem .9rem;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      align-self: flex-end; transition: opacity .15s; white-space: nowrap;
    }
    #btn-send:hover:not(:disabled) { opacity: .85; }
    #btn-send:disabled { background: var(--surface-high); color: var(--text-subtle); cursor: not-allowed; }

    #btn-mic {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 8px; padding: .5rem .65rem;
      font-size: 1.05rem; cursor: pointer; align-self: flex-end;
      transition: background .15s, border-color .15s; line-height: 1;
      color: var(--text-muted);
    }
    #btn-mic:hover:not(:disabled) { background: var(--surface-high); border-color: var(--border-active); }
    #btn-mic:disabled { opacity: .35; cursor: not-allowed; }
    #btn-mic.recording {
      background: var(--amber-dim); border-color: var(--amber-border); color: var(--amber);
      animation: pulse-mic .8s ease infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { box-shadow: 0 0 0 0 var(--amber-border); }
      50%       { box-shadow: 0 0 0 5px transparent; }
    }

    #btn-end-interview {
      background: none; border: 1px solid var(--border);
      color: var(--text-subtle); border-radius: 6px; padding: .35rem .75rem;
      font-size: .78rem; cursor: pointer; align-self: flex-start;
      transition: border-color .15s, color .15s;
    }
    #btn-end-interview:hover:not(:disabled) { border-color: var(--border-active); color: var(--text-muted); }
    #btn-end-interview:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Complete banner ── */
    #complete-banner {
      display: none; margin: .5rem 0;
      background: var(--primary-dim); border: 1px solid var(--primary-border);
      border-radius: 8px; padding: .6rem 1rem;
      font-size: .82rem; color: var(--primary); text-align: center;
    }

    /* ── Generate-timeline btn (interview footer) ── */
    #btn-generate-timeline {
      display: none; width: 100%;
      background: var(--primary); color: var(--primary-on); border: none;
      border-radius: 8px; padding: .65rem;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    #btn-generate-timeline:hover { opacity: .85; }

    /* ── Documents panel ── */
    #doc-upload-area {
      padding: .6rem .75rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #dropzone {
      border: 2px dashed var(--border-active); border-radius: 8px;
      padding: .6rem .5rem; text-align: center; cursor: pointer;
      font-size: .78rem; color: var(--text-subtle);
      transition: border-color .2s, background .2s; line-height: 1.6;
    }
    #dropzone.over { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); }
    .file-label { color: var(--primary); cursor: pointer; text-decoration: underline; }

    #doc-list { flex: 1; overflow-y: auto; padding: .5rem; }

    .doc-item {
      display: flex; align-items: center; gap: .45rem;
      padding: .45rem .55rem; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); margin-bottom: .35rem;
      transition: background .15s, border-color .15s; background: var(--surface-raised);
    }
    .doc-item:hover { background: var(--surface-high); border-color: var(--border-active); }
    .doc-name {
      flex: 1; font-size: .78rem; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; color: var(--text);
    }
    .doc-kind { font-size: .65rem; color: var(--text-subtle); flex-shrink: 0; }

    .status-chip {
      font-size: .68rem; font-weight: 700;
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chip-pending    { background: var(--surface-high); color: var(--text-subtle); animation: spin-chip 1.5s linear infinite; }
    .chip-done       { background: var(--green-dim); color: var(--green); }
    .chip-unreadable { background: var(--amber-dim); color: var(--amber); }
    .chip-error      { background: var(--red-dim); color: var(--red); }
    @keyframes spin-chip { to { transform: rotate(360deg); } }

    .doc-reupload {
      background: none; border: none; color: var(--text-subtle);
      cursor: pointer; font-size: .85rem; padding: 0 .15rem; flex-shrink: 0;
    }
    .doc-reupload:hover { color: var(--primary); }
    .doc-empty { text-align: center; color: var(--text-subtle); font-size: .8rem; padding: 1.5rem .5rem; }

    /* ── Audit modal ── */
    .modal {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
    }
    .modal.hidden { display: none; }
    .modal-backdrop { position: absolute; inset: 0; background: var(--backdrop); }
    .modal-box {
      position: relative; background: var(--surface-card); border-radius: 12px;
      width: min(90vw, 680px); max-height: 82vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px var(--backdrop); border: 1px solid var(--border);
    }
    .modal-header {
      display: flex; align-items: center; gap: .5rem;
      padding: .75rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--surface);
    }
    #audit-title {
      flex: 1; font-size: .92rem; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #audit-close {
      background: none; border: none; font-size: 1.3rem;
      cursor: pointer; color: var(--text-subtle); line-height: 1; padding: 0 .2rem;
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 1rem; }
    .audit-status-row { margin-bottom: .6rem; font-size: .82rem; color: var(--text-muted); }
    .audit-warnings {
      background: var(--amber-dim); border: 1px solid var(--amber-border); border-radius: 6px;
      padding: .5rem .75rem; margin-bottom: .7rem; font-size: .78rem; color: var(--amber);
    }
    .warn-item + .warn-item { margin-top: .2rem; }
    .audit-section-title {
      font-size: .7rem; font-weight: 700; color: var(--text-subtle);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: .3rem;
    }
    .audit-text {
      background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px;
      padding: .65rem .75rem; font-size: .76rem; font-family: ui-monospace, monospace;
      white-space: pre-wrap; word-break: break-word; color: var(--text-muted);
      max-height: 280px; overflow-y: auto; margin-bottom: .8rem;
    }
    .audit-meta {
      background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px;
      padding: .65rem .75rem; font-size: .72rem; font-family: ui-monospace, monospace;
      white-space: pre-wrap; max-height: 180px; overflow-y: auto; color: var(--text-muted);
    }

    /* ── Timeline / events panel ── */
    .panel-header-sub { font-weight: 400; opacity: .6; font-size: .75em; }

    #tl-toolbar {
      display: flex; align-items: center; gap: .45rem; flex-wrap: wrap;
      padding: .5rem .75rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--surface);
    }
    #btn-extract, #btn-generate {
      border: none; border-radius: 6px; padding: .32rem .7rem;
      font-size: .78rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    #btn-extract  { background: var(--surface-highest); color: var(--text-muted); }
    #btn-generate { background: var(--primary); color: var(--primary-on); }
    #btn-extract:hover:not(:disabled)  { background: var(--border-active); color: var(--text); }
    #btn-generate:hover:not(:disabled) { opacity: .85; }
    #btn-extract:disabled, #btn-generate:disabled { background: var(--surface-high); color: var(--text-subtle); cursor: not-allowed; }
    .tl-toggle-btn {
      margin-left: auto; background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: .25rem .6rem; font-size: .72rem;
      cursor: pointer; color: var(--text-subtle); transition: border-color .15s;
    }
    .tl-toggle-btn:hover { border-color: var(--border-active); color: var(--text-muted); }
    #tl-status { font-size: .72rem; color: var(--text-subtle); }
    #tl-count  { font-size: .75rem; color: var(--text-subtle); }

    .tl-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .tl-view.hidden { display: none; }
    #events-list, #fused-events-list { flex: 1; overflow-y: auto; padding: .5rem .6rem; }

    /* Conflict section */
    #conflicts-section { flex-shrink: 0; }
    .conflict-card {
      margin: .4rem .6rem; border: 1px solid var(--amber-border); border-radius: 8px;
      background: var(--amber-dim); padding: .5rem .65rem; font-size: .78rem;
    }
    .conflict-header { display: flex; align-items: center; gap: .4rem; margin-bottom: .3rem; }
    .conflict-type-badge {
      font-size: .6rem; font-weight: 700; text-transform: uppercase;
      padding: .12rem .4rem; border-radius: 999px; white-space: nowrap;
      background: var(--amber-border); color: var(--amber);
    }
    .conflict-detail { font-size: .77rem; color: var(--text-muted); flex: 1; }
    .conflict-events { display: flex; gap: .4rem; margin-bottom: .4rem; }
    .conflict-ev {
      flex: 1; background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 6px; padding: .3rem .5rem; font-size: .72rem; color: var(--text-muted);
    }
    .conflict-ev-label { font-size: .62rem; color: var(--text-subtle); display: block; }
    .conflict-actions { display: flex; gap: .3rem; flex-wrap: wrap; }
    .conflict-resolve-btn {
      font-size: .7rem; border: 1px solid var(--border); border-radius: 5px;
      padding: .2rem .5rem; cursor: pointer;
      background: var(--surface-raised); color: var(--text-muted); transition: background .15s;
    }
    .conflict-resolve-btn:hover { background: var(--surface-high); }
    .conflict-resolve-btn.active { background: var(--primary-dim); color: var(--primary); border-color: var(--primary-border); }
    .conflict-resolved-label { font-size: .7rem; color: var(--green); font-style: italic; }

    /* Canonical event extras */
    .event-flag { color: var(--amber); font-size: .75rem; flex-shrink: 0; }
    .event-sources { display: flex; gap: .25rem; flex-wrap: wrap; margin-top: .2rem; }
    .src-chip {
      font-size: .62rem; padding: .1rem .35rem; border-radius: 999px;
      background: var(--surface-highest); color: var(--text-subtle); border: 1px solid var(--border);
    }
    .cluster-hint { font-size: .65rem; color: var(--text-subtle); margin-top: .15rem; }

    /* ── Confidence badge (amber = mid, unified with vague-date colour) ── */
    .conf-badge {
      font-size: .58rem; font-weight: 700; letter-spacing: .04em;
      padding: .1rem .38rem; border-radius: 999px;
      text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
    }
    .conf-high { background: var(--primary-dim);          color: var(--primary); }
    .conf-mid  { background: var(--amber-dim);            color: var(--amber); }   /* same amber as vague dates */
    .conf-low  { background: var(--red-dim);              color: var(--red); }

    /* ── Re-extract hint banner ── */
    .reextract-hint {
      margin: .4rem .5rem 0; padding: .45rem .65rem;
      background: var(--primary-dim); border: 1px solid var(--primary-border);
      border-radius: 6px; font-size: .76rem; color: var(--primary); line-height: 1.4;
    }

    .year-group { margin-bottom: .75rem; }
    .year-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-subtle);
      padding: .2rem .2rem .3rem; border-bottom: 1px solid var(--border);
      margin-bottom: .4rem;
    }
    .event-card {
      background: var(--surface-raised); border: 1px solid var(--border); border-radius: 8px;
      padding: .5rem .65rem; margin-bottom: .35rem;
      cursor: default; transition: background .1s, border-color .1s;
    }
    .event-card:hover { background: var(--surface-high); border-color: var(--border-active); }
    .event-card-top { display: flex; align-items: flex-start; gap: .4rem; }
    .event-badge {
      font-size: .6rem; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; padding: .15rem .45rem;
      border-radius: 999px; white-space: nowrap; flex-shrink: 0;
    }
    /* Type badges — driven by semantic palette vars (light/dark override together) */
    .badge-Diagnosis      { background: var(--badge-dx-bg);   color: var(--badge-dx-fg); }
    .badge-Medication     { background: var(--badge-med-bg);  color: var(--badge-med-fg); }
    .badge-LabResult      { background: var(--badge-lab-bg);  color: var(--badge-lab-fg); }
    .badge-Surgery        { background: var(--badge-surg-bg); color: var(--badge-surg-fg); }
    .badge-Hospitalization{ background: var(--badge-hosp-bg); color: var(--badge-hosp-fg); }
    .badge-Symptom        { background: var(--badge-symp-bg); color: var(--badge-symp-fg); }
    .badge-Consultation   { background: var(--badge-cons-bg); color: var(--badge-cons-fg); }

    .event-desc { font-size: .8rem; color: var(--text); flex: 1; line-height: 1.4; }
    .event-meta { display: flex; gap: .5rem; margin-top: .25rem; align-items: center; }
    .event-date { font-size: .7rem; color: var(--text-subtle); }
    .event-date.vague { color: var(--amber); }    /* amber: unified warning/attention */
    .event-src  { font-size: .65rem; color: var(--text-subtle); margin-left: auto; }

    /* ── Phase 6D-B: Timeline event card ───────────────── */
    #fused-events-list { position: relative; padding: .5rem .5rem; }
    /* Vertical timeline line through all events */
    #fused-events-list::before {
      content: ''; position: absolute;
      left: 22px; top: .75rem; bottom: .75rem;
      width: 1px; background: var(--border); pointer-events: none;
    }
    .tl-ev-wrap {
      display: flex; align-items: flex-start; gap: .55rem;
      margin-bottom: .55rem; position: relative; z-index: 1;
    }
    .tl-dot {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
      background: var(--primary); border: 3px solid var(--surface-card);
      margin-top: .72rem; box-sizing: border-box;
    }
    .tl-dot-mid { background: var(--border-active); }
    .tl-dot-dim { background: var(--surface-highest); }
    .tl-ev-card {
      flex: 1; background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 8px; padding: .6rem .7rem; transition: border-color .15s;
    }
    .tl-ev-card:hover { border-color: var(--border-active); }
    .tl-ev-card.tl-ev-flagged { border-color: var(--amber-border); }
    .tl-ev-date {
      font-size: .67rem; color: var(--text-subtle);
      font-family: ui-monospace, monospace; margin-bottom: .22rem;
    }
    .tl-ev-date.vague { color: var(--amber); }
    .tl-ev-title-row { display: flex; align-items: flex-start; gap: .4rem; margin-bottom: .3rem; }
    .tl-ev-title { font-size: .82rem; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }
    .tl-ev-indicators { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; margin-bottom: .22rem; }
    .tl-ev-merged { font-size: .68rem; color: var(--text-subtle); font-style: italic; }
    .tl-ev-src-chips { display: flex; gap: .3rem; flex-wrap: wrap; }
    .tl-year-group { margin-bottom: .35rem; }
    .tl-year-label {
      font-size: .63rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--text-subtle);
      padding: .55rem 0 .25rem 1.85rem;
    }

    /* ── Phase 6D-B: Conflict card ──────────────────────── */
    /* Collapsible toggle header (replaces static .cf-section-hdr) */
    .cf-toggle-hdr {
      /* Reset button defaults */
      background: none; border: none; font-family: inherit;
      /* Layout */
      display: flex; align-items: center; gap: .35rem; width: 100%;
      padding: .4rem .6rem .3rem;
      /* Type */
      font-size: .67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--amber);
      cursor: pointer; user-select: none;
    }
    .cf-toggle-hdr:focus-visible {
      outline: 2px solid var(--amber); outline-offset: -2px; border-radius: 4px;
    }
    .cf-chevron {
      margin-left: auto; flex-shrink: 0; display: inline-block;
      transition: transform .2s ease; font-style: normal; line-height: 1;
    }
    .cf-toggle-hdr[aria-expanded="true"] .cf-chevron { transform: rotate(180deg); }
    /* Cards container — hidden by default, shown when .open is added */
    .cf-cards-body          { display: none; }
    .cf-cards-body.open     { display: block; }
    .cf-card {
      background: var(--amber-dim); border: 1px solid var(--amber-border);
      border-radius: 8px; padding: .6rem .7rem; margin: 0 .5rem .45rem;
    }
    .cf-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: .3rem; }
    .cf-type-label {
      font-size: .64rem; font-weight: 700; color: var(--amber);
      text-transform: uppercase; letter-spacing: .07em;
    }
    .cf-action { font-size: .65rem; color: var(--text-subtle); }
    .cf-resolved-status { font-size: .65rem; color: var(--green); }
    .cf-detail { font-size: .75rem; color: var(--text-muted); margin-bottom: .4rem; line-height: 1.4; }
    .cf-sources { display: flex; flex-direction: column; gap: .2rem; margin-bottom: .4rem; }
    .cf-src-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface-raised); border-radius: 4px; padding: .25rem .45rem; gap: .5rem;
    }
    .cf-src-lbl { font-size: .68rem; color: var(--text-subtle); flex-shrink: 0; white-space: nowrap; }
    .cf-src-val {
      font-size: .7rem; color: var(--text); font-weight: 500;
      text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cf-src-val--interview { color: var(--primary); }
    .cf-resolve-actions { display: flex; gap: .3rem; flex-wrap: wrap; }

    /* ── Phase 6D-B: Document card ──────────────────────── */
    .doc-card {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 8px; padding: .6rem .65rem; margin-bottom: .4rem;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .doc-card:hover { background: var(--surface-high); border-color: var(--border-active); }
    .doc-card-pending { border-left: 3px solid var(--amber); }
    .doc-card-error   { border-left: 3px solid var(--red); }
    .doc-card-inner { display: flex; align-items: flex-start; gap: .55rem; }
    .doc-card-icon { font-size: 1rem; flex-shrink: 0; line-height: 1; margin-top: .1rem; }
    .doc-card-info { flex: 1; min-width: 0; }
    .doc-card-name {
      font-size: .78rem; font-weight: 500; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: .2rem;
    }
    .doc-card-status-row { display: flex; align-items: center; gap: .35rem; }
    .doc-card-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .doc-card-dot--done       { background: var(--primary); }
    .doc-card-dot--pending    { background: var(--amber); animation: spin-chip 1.5s linear infinite; }
    .doc-card-dot--error      { background: var(--red); }
    .doc-card-dot--unreadable { background: var(--amber); }
    .doc-card-status-text {
      font-size: .65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-subtle);
    }
    .doc-card-reupload {
      background: none; border: none; color: var(--text-subtle);
      cursor: pointer; font-size: .78rem; padding: .1rem .2rem;
      border-radius: 4px; flex-shrink: 0; align-self: center;
    }
    .doc-card-reupload:hover { color: var(--primary); }

    /* ── Phase 7C: Clinical summary button ──────────────────────── */
    #btn-summary {
      background: var(--green-dim); color: var(--green);
      border: 1px solid rgba(52,211,153,.28); border-radius: 6px;
      padding: .32rem .7rem; font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s; font-family: inherit;
    }
    #btn-summary:hover:not(:disabled) { opacity: .8; }
    #btn-summary:disabled {
      background: var(--surface-high); color: var(--text-subtle);
      border-color: transparent; cursor: not-allowed;
    }
    [data-theme="light"] #btn-summary {
      background: var(--green-dim); border-color: rgba(5,150,105,.22);
    }

    /* Summary modal */
    #summary-modal .modal-box { width: min(92vw, 720px); }

    /* Section headings */
    .summ-section { margin-bottom: 1.1rem; }
    .summ-section-hdr {
      font-size: .63rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--text-subtle);
      padding-bottom: .28rem; margin-bottom: .55rem;
      border-bottom: 1px solid var(--border);
    }
    /* Individual claim entry */
    .summ-entry { margin-bottom: .7rem; padding-left: .55rem;
      border-left: 2px solid var(--border); }
    .summ-entry-text {
      font-size: .84rem; color: var(--text); line-height: 1.5; margin-bottom: .28rem;
    }
    /* Citation chips row + snippet */
    .summ-cit-row { display: flex; flex-wrap: wrap; gap: .28rem; margin-bottom: .2rem; }
    .summ-snippet {
      font-size: .72rem; color: var(--text-subtle); font-style: italic;
      border-left: 2px solid var(--primary-border); padding-left: .4rem;
      margin-top: .12rem; line-height: 1.45;
    }
    /* Callout boxes */
    .summ-callout {
      padding: .55rem .75rem; border-radius: 8px;
      font-size: .8rem; line-height: 1.5; margin-bottom: .8rem;
    }
    .summ-callout-hdr { font-weight: 700; display: block; margin-bottom: .2rem; }
    .summ-callout-conflict {
      background: var(--amber-dim); border: 1px solid var(--amber-border); color: var(--amber);
    }
    .summ-callout-quality {
      background: var(--surface-raised); border: 1px solid var(--border); color: var(--text-subtle);
    }
    /* Loading / error states inside modal */
    .summ-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 7rem; color: var(--text-subtle); font-size: .85rem;
    }
    .summ-error {
      padding: .65rem .75rem; border-radius: 8px;
      background: var(--red-dim); border: 1px solid var(--red-border);
      color: var(--red); font-size: .82rem; line-height: 1.4;
    }
    /* Generated-at footer */
    .summ-footer {
      font-size: .65rem; color: var(--text-subtle);
      margin-top: .75rem; padding-top: .5rem; border-top: 1px solid var(--border);
      font-family: ui-monospace, monospace;
    }
    /* "Try again" button inside error state */
    .summ-retry-btn {
      display: block; margin-top: .55rem;
      background: none; border: 1px solid var(--red-border); border-radius: 6px;
      color: var(--red); padding: .3rem .75rem; font-size: .78rem;
      font-family: inherit; cursor: pointer; transition: background .15s;
    }
    .summ-retry-btn:hover { background: var(--red-dim); }

    /* ── Phase 7B: Provenance panel ─────────────────────────────── */
    /* Make both fused and raw event cards interactive */
    .tl-ev-card  { cursor: pointer; }
    .event-card  { cursor: pointer; }
    .tl-ev-card:focus-visible,
    .event-card:focus-visible {
      outline: 2px solid var(--primary); outline-offset: 2px;
    }

    /* Provenance modal width override */
    #prov-modal .modal-box { width: min(90vw, 520px); }

    /* Member cards inside provenance body */
    .prov-member {
      background: var(--surface-raised); border: 1px solid var(--border);
      border-radius: 8px; padding: .65rem .75rem; margin-bottom: .5rem;
    }
    .prov-member.prov-canonical {
      border-color: var(--primary-border); background: var(--primary-dim);
    }
    .prov-member-header {
      display: flex; align-items: center; gap: .35rem; flex-wrap: wrap;
      margin-bottom: .32rem;
    }
    /* Source-kind chip */
    .prov-kind-chip {
      font-size: .62rem; font-weight: 600; padding: .1rem .42rem;
      border-radius: 999px; white-space: nowrap;
    }
    .prov-kind-interview {
      background: var(--primary-dim); color: var(--primary);
      border: 1px solid var(--primary-border);
    }
    .prov-kind-doc {
      background: var(--green-dim); color: var(--green);
      border: 1px solid rgba(52,211,153,.28);
    }
    [data-theme="light"] .prov-kind-doc { border-color: rgba(5,150,105,.25); }
    /* Small tags: Primary / Patient denial */
    .prov-tag {
      font-size: .58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: .09rem .36rem; border-radius: 999px;
      white-space: nowrap;
    }
    .prov-tag-primary {
      background: var(--primary-dim); color: var(--primary);
      border: 1px solid var(--primary-border);
    }
    .prov-tag-denial {
      background: var(--red-dim); color: var(--red);
      border: 1px solid rgba(239,68,68,.28);
    }
    [data-theme="light"] .prov-tag-denial { border-color: rgba(220,38,38,.25); }
    /* Member description */
    .prov-member-desc {
      font-size: .8rem; font-weight: 500; color: var(--text); margin-bottom: .2rem;
    }
    /* Filename / source label */
    .prov-member-label {
      font-size: .68rem; color: var(--text-subtle);
      margin-bottom: .2rem; font-family: ui-monospace, monospace;
    }
    /* Verbatim snippet — quoted, italic, left-accented */
    .prov-snippet {
      font-size: .78rem; color: var(--text-muted); font-style: italic;
      line-height: 1.5; border-left: 2px solid var(--primary-border);
      padding-left: .5rem; margin-top: .12rem;
    }
    /* Placeholder for missing snippets */
    .prov-snippet-null {
      font-size: .7rem; color: var(--text-subtle);
      font-style: italic; margin-top: .12rem;
    }
    /* Inline error inside modal body */
    .prov-error {
      padding: .65rem .75rem; border-radius: 8px;
      background: var(--red-dim); border: 1px solid var(--red-border);
      font-size: .82rem; color: var(--red); line-height: 1.4;
    }
    /* Subtitle showing member count */
    .prov-subtitle {
      font-size: .7rem; color: var(--text-subtle); margin-bottom: .65rem;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.25rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface-highest); color: var(--text);
      padding: .5rem 1.2rem; border-radius: 8px; border: 1px solid var(--border);
      font-size: .82rem; transition: transform .25s ease;
      pointer-events: none; z-index: 100;
    }
    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--toast-err-bg); border-color: var(--red); color: var(--toast-err-fg); }
  </style>
</head>
<body>

<div id="topbar">
  <h1>MediTrace</h1>
  <span id="session-label">Starting session…</span>
  <button id="btn-theme" title="Toggle theme" aria-label="Toggle theme">
    <!-- sun icon (shown in dark mode → click to switch to light) -->
    <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <!-- moon icon (shown in light mode → click to switch to dark) -->
    <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
  <button id="btn-patients" title="Browse patients">Patients</button>
  <button id="btn-new-session">New Session</button>
</div>

<div id="panels">
  <!-- LEFT: Documents -->
  <div class="panel" id="panel-docs">
    <div class="panel-header">Documents</div>
    <div id="doc-upload-area">
      <div id="dropzone">
        <div>📎 Drop PDF or image here</div>
        <div>or <label for="file-input" class="file-label">browse files</label></div>
        <input type="file" id="file-input" accept=".pdf,image/*" multiple hidden>
      </div>
    </div>
    <div id="doc-list">
      <div class="doc-empty">No documents yet.</div>
    </div>
  </div>

  <!-- CENTER: Interview -->
  <div class="panel" id="panel-interview">
    <div class="panel-header">Interview</div>

    <div id="coverage-strip">
      <!-- filled by JS -->
    </div>

    <div id="chat-messages">
      <!-- messages appended here -->
    </div>

    <div id="chat-footer">
      <div id="complete-banner">
        Interview complete — all topics covered.
      </div>
      <button id="btn-generate-timeline">Generate Timeline</button>
      <div id="chat-input-row">
        <textarea id="chat-input" rows="2" placeholder="Type your response…"></textarea>
        <button id="btn-mic" title="Click to record">🎤</button>
        <button id="btn-send">Send</button>
      </div>
      <button id="btn-end-interview">End interview early</button>
    </div>
  </div>

  <!-- RIGHT: Timeline (fused) / Raw events toggle -->

<script>
// ── Constants ──────────────────────────────────────────────
const TOPIC_LABELS = {
  chief_complaint:    'Chief complaint',
  chronic_conditions: 'Chronic',
  medications:        'Medications',
  surgeries:          'Surgeries',
  hospitalizations:   'Hospitalizations',
  allergies:          'Allergies',
  family_history:     'Family history',
};

// ── State ──────────────────────────────────────────────────
let sessionId = null;
let interviewDone = false;
let mediaRecorder = null;
let audioChunks = [];

// ── DOM refs ───────────────────────────────────────────────
const chatMessages   = document.getElementById('chat-messages');
const chatInput      = document.getElementById('chat-input');
const btnSend        = document.getElementById('btn-send');
const btnMic         = document.getElementById('btn-mic');
const btnEnd         = document.getElementById('btn-end-interview');
const btnNew         = document.getElementById('btn-new-session');
const sessionLabel   = document.getElementById('session-label');
const coverageStrip  = document.getElementById('coverage-strip');
const completeBanner = document.getElementById('complete-banner');
const btnGenTimeline = document.getElementById('btn-generate-timeline');
const toast          = document.getElementById('toast');

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = isError ? 'show error' : 'show';
  toastTimer = setTimeout(() => { toast.className = ''; }, 3500);
}

// ── Coverage strip ─────────────────────────────────────────
function renderCoverage(coverageMap) {
  coverageStrip.innerHTML = '';
  const icons = { covered: '✓ ', partial: '◑ ', uncovered: '' };
  for (const [topic, status] of Object.entries(coverageMap)) {
    const pill = document.createElement('span');
    pill.className = `pill pill-${status}`;
    pill.title = `${TOPIC_LABELS[topic] ?? topic}: ${status}`;
    pill.textContent = (icons[status] ?? '') + (TOPIC_LABELS[topic] ?? topic);
    coverageStrip.appendChild(pill);
  }
}

function initCoverageStrip() {
  const empty = {};
  for (const k of Object.keys(TOPIC_LABELS)) empty[k] = 'uncovered';
  renderCoverage(empty);
}

// ── Chat helpers ───────────────────────────────────────────
function appendMessage(role, text) {
  // Remove typing indicator if present
  const existing = chatMessages.querySelector('.typing-indicator');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function appendSystem(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'typing-indicator msg-assistant';
  wrap.style.alignSelf = 'flex-start';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(dots);
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ── Disable / enable input ─────────────────────────────────
function setInputEnabled(enabled) {
  chatInput.disabled = !enabled;
  btnSend.disabled   = !enabled;
  btnEnd.disabled    = !enabled;
  btnMic.disabled    = !enabled;
}

// ── Interview complete state ───────────────────────────────
function markInterviewComplete() {
  interviewDone = false;          // keep input live — patient may add late details
  completeBanner.style.display = 'block';
  btnGenTimeline.style.display = 'block';
  // Hide "end early" button (interview is already complete)
  btnEnd.style.display = 'none';
  setInputEnabled(true);          // leave text + mic open for follow-ups
  appendSystem('— Interview complete — feel free to add anything else —');
}

// ── Voice recording ────────────────────────────────────────
async function startRecording() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    showToast('Microphone access denied — use the text input instead.', true);
    return;
  }

  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    stream.getTracks().forEach(t => t.stop());
    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(audioChunks, { type: mimeType });
    sendVoiceTurn(blob, mimeType);
  };

  mediaRecorder.start();
  btnMic.classList.add('recording');
  btnMic.textContent = '⏹';
  btnMic.title = 'Click to stop recording';
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  btnMic.classList.remove('recording');
  btnMic.textContent = '🎤';
  btnMic.title = 'Click to record';
}

async function sendVoiceTurn(blob, mimeType) {
  if (interviewDone || !sessionId) return;

  setInputEnabled(false);

  // Show transcribing indicator
  const transcribingEl = document.createElement('div');
  transcribingEl.className = 'msg msg-system';
  transcribingEl.textContent = 'Transcribing…';
  chatMessages.appendChild(transcribingEl);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  const formData = new FormData();
  formData.append('audio', blob, 'recording.webm');

  try {
    const res = await fetch(`/api/sessions/${sessionId}/interview/voice-turn`, {
      method: 'POST',
      body: formData,
    });

    transcribingEl.remove();

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({ detail: 'Unknown error' }));
      showToast(
        res.status === 422
          ? "Couldn't hear that — try again or type your answer."
          : (errBody.detail ?? `HTTP ${res.status}`),
        true
      );
      return;
    }

    const data = await res.json();
    appendMessage('user', data.transcript);
    appendMessage('assistant', data.reply);
    renderCoverage(data.coverage);

    if (data.interview_complete) {
      await callComplete().catch(() => {});
      markInterviewComplete();
    }
  } catch (err) {
    transcribingEl.remove();
    showToast("Couldn't hear that — try again or type your answer.", true);
  } finally {
    if (!interviewDone) {
      setInputEnabled(true);
      chatInput.focus();
    }
  }
}

btnMic.addEventListener('click', () => {
  if (interviewDone || !sessionId) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    startRecording();
  }
});

// ── API calls ──────────────────────────────────────────────
async function createSession(patientData = {}) {
  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(patientData),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Phase 8: patient identity header helper ──────────────
function _patientTag(session) {
  if (!session.patient_name) return 'Unknown patient';
  let tag = session.patient_name;
  // Combine age + sex as "58F", "45M", "58", "F", etc.
  const ageSex = (session.patient_age != null ? String(session.patient_age) : '')
               + (session.patient_sex || '');
  if (ageSex) tag += ' · ' + ageSex;
  return tag;
}

function setSessionHeader(session) {
  const hash = session.id.slice(0, 8) + '…';
  sessionLabel.textContent = _patientTag(session) + ' · Session ' + hash;
  sessionLabel.title = session.id;
}

async function sendTurn(message) {
  const res = await fetch(`/api/sessions/${sessionId}/interview/turn`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
    throw new Error(err.detail ?? `HTTP ${res.status}`);
  }
  return res.json();
}

async function callComplete() {
  const res = await fetch(`/api/sessions/${sessionId}/interview/complete`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
  });
  if (!res.ok && res.status !== 409) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Main turn handler ──────────────────────────────────────
async function doTurn(userMessage) {
  if (interviewDone || !sessionId) return;

  setInputEnabled(false);

  if (userMessage) {
    appendMessage('user', userMessage);
  }

  showTyping();

  try {
    const data = await sendTurn(userMessage);
    appendMessage('assistant', data.reply);
    renderCoverage(data.coverage);

    if (data.interview_complete) {
      await callComplete().catch(() => {});
      markInterviewComplete();
    }
  } catch (err) {
    // Remove typing indicator on error
    const indicator = chatMessages.querySelector('.typing-indicator');
    if (indicator) indicator.remove();
    appendSystem('The assistant had trouble — please try again.');
    showToast(err.message, true);
  } finally {
    if (!interviewDone) {
      setInputEnabled(true);
      chatInput.focus();
    }
  }
}

// ── Send button / enter key ────────────────────────────────
btnSend.addEventListener('click', () => {
  const msg = chatInput.value.trim();
  if (!msg) return;
  chatInput.value = '';
  doTurn(msg);
});

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    btnSend.click();
  }
});

// ── End interview early ────────────────────────────────────
btnEnd.addEventListener('click', async () => {
  if (interviewDone || !sessionId) return;
  setInputEnabled(false);
  try {
    await callComplete();
    markInterviewComplete();
    showToast('Interview ended early.');
  } catch (err) {
    setInputEnabled(true);
    showToast(err.message, true);
  }
});

// ── URL param helpers ──────────────────────────────────────
function getSessionParam() {
  return new URLSearchParams(location.search).get('session');
}

function setSessionParam(id) {
  history.replaceState(null, '', '?session=' + id);
}

// ── New session button ─────────────────────────────────────
// ── Phase 8: New-session modal ─────────────────────────────
const npModal   = document.getElementById('np-modal');
const npBackdrop = document.getElementById('np-backdrop');
const npClose   = document.getElementById('np-close');
const npCancel  = document.getElementById('np-cancel');
const npForm    = document.getElementById('np-form');
const npName    = document.getElementById('np-name');
const npAge     = document.getElementById('np-age');
const npSex     = document.getElementById('np-sex');
const npSubmit  = document.getElementById('np-submit');

function openNewSessionModal() {
  npForm.reset();
  npModal.classList.remove('hidden');
  // Small delay so modal is visible before focusing
  setTimeout(() => npName.focus(), 50);
}
function closeNewSessionModal() { npModal.classList.add('hidden'); }

btnNew.addEventListener('click', openNewSessionModal);
npClose.addEventListener('click', closeNewSessionModal);
npCancel.addEventListener('click', closeNewSessionModal);
npBackdrop.addEventListener('click', closeNewSessionModal);

npForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = npName.value.trim();
  if (!name) { npName.focus(); return; }
  const age  = npAge.value  ? parseInt(npAge.value, 10)  : null;
  const sex  = npSex.value  || null;

  npSubmit.disabled = true;
  npSubmit.textContent = 'Starting…';
  try {
    const session = await createSession({ name, age, sex });
    location.href = '?session=' + session.id;
  } catch (err) {
    showToast(err.message, true);
    npSubmit.disabled = false;
    npSubmit.textContent = 'Start Session';
  }
});

// ── Phase 8: Patients list modal ───────────────────────────
const btnPatients = document.getElementById('btn-patients');
const ptsModal    = document.getElementById('pts-modal');
const ptsBackdrop = document.getElementById('pts-backdrop');
const ptsClose    = document.getElementById('pts-close');
const ptsBody     = document.getElementById('pts-body');

function closePatientsModal() { ptsModal.classList.add('hidden'); }
ptsClose.addEventListener('click', closePatientsModal);
ptsBackdrop.addEventListener('click', closePatientsModal);

function renderPatientsList(patients) {
  ptsBody.innerHTML = '';
  if (!patients.length) {
    const empty = document.createElement('p');
    empty.className = 'pts-empty';
    empty.textContent = 'No patients yet — click "New Session" to add the first one.';
    ptsBody.appendChild(empty);
    return;
  }
  for (const p of patients) {
    const row = document.createElement('div');
    row.className = 'pt-row';

    const info = document.createElement('div');
    info.className = 'pt-info';

    const nameEl = document.createElement('span');
    nameEl.className = 'pt-name';
    nameEl.textContent = p.name;

    const metaEl = document.createElement('span');
    metaEl.className = 'pt-meta';
    const ageSex = (p.age != null ? String(p.age) : '') + (p.sex || '');
    metaEl.textContent = ageSex || '—';

    info.appendChild(nameEl);
    info.appendChild(metaEl);
    row.appendChild(info);

    if (p.latest_session_id) {
      row.classList.add('pt-row-clickable');
      row.setAttribute('tabindex', '0');
      row.setAttribute('title', 'Resume latest session');
      const hint = document.createElement('span');
      hint.className = 'pt-resume-hint';
      hint.textContent = 'Resume →';
      row.appendChild(hint);

      const onResume = () => {
        closePatientsModal();
        location.href = '?session=' + p.latest_session_id;
      };
      row.addEventListener('click', onResume);
      row.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onResume(); }
      });
    } else {
      const ns = document.createElement('span');
      ns.className = 'pt-no-session';
      ns.textContent = 'No sessions';
      row.appendChild(ns);
    }
    ptsBody.appendChild(row);
  }
}

btnPatients.addEventListener('click', async () => {
  ptsBody.innerHTML = '<div class="pts-empty">Loading…</div>';
  ptsModal.classList.remove('hidden');
  try {
    const r = await fetch('/api/patients');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const patients = await r.json();
    renderPatientsList(patients);
  } catch (err) {
    ptsBody.innerHTML = `<p class="pts-empty" style="color:var(--red)">Failed to load patients: ${err.message}</p>`;
  }
});

// ── Rehydrate an existing session ─────────────────────────
async function rehydrate(id) {
  const res = await fetch(`/api/sessions/${id}`);
  if (!res.ok) throw new Error(`Session ${id} not found (HTTP ${res.status})`);
  const session = await res.json();

  sessionId = session.id;
  setSessionHeader(session);

  // Restore coverage pills
  const coverage = session.interview_state?.coverage_map;
  if (coverage && Object.keys(coverage).length) renderCoverage(coverage);
  else initCoverageStrip();

  // Restore docs, events, timeline
  refreshDocList();
  loadEvents();
  loadTimeline();
  _enableGenerate();

  // Replay transcript into chat
  for (const turn of (session.transcript || [])) {
    appendMessage(turn.role, turn.content);
  }

  // Restore complete state if applicable
  const doneStatuses = ['interview_complete', 'processing', 'timeline_generated'];
  if (doneStatuses.includes(session.status)) {
    markInterviewComplete();
    return;
  }

  // If transcript is empty this is a fresh session — fire opening turn
  if (!session.transcript || session.transcript.length === 0) {
    await doTurn('');
  } else {
    setInputEnabled(true);
    chatInput.focus();
  }
}

// ── Boot ───────────────────────────────────────────────────
async function boot() {
  initCoverageStrip();
  setInputEnabled(false);

  const existingId = getSessionParam();

  if (existingId) {
    try {
      await rehydrate(existingId);
    } catch (err) {
      // Bad/expired ID — fall through and create a fresh session
      appendSystem('Could not load session — starting a new one.');
      showToast(err.message, true);
      await startFreshSession();
    }
  } else {
    await startFreshSession();
  }
}

async function startFreshSession() {
  try {
    const session = await createSession();
    sessionId = session.id;
    setSessionHeader(session);
    setSessionParam(session.id);
    refreshDocList();
    loadEvents();
    _enableGenerate();
    await doTurn('');
  } catch (err) {
    appendSystem('Failed to start session. Check the server and refresh.');
    showToast(err.message, true);
    sessionLabel.textContent = 'Error';
  }
}

// ── Document panel ─────────────────────────────────────────
const dropzone  = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const docList   = document.getElementById('doc-list');
const auditModal   = document.getElementById('audit-modal');
const auditBackdrop = document.getElementById('audit-backdrop');
const auditClose   = document.getElementById('audit-close');
const auditTitle   = document.getElementById('audit-title');
const auditBody    = document.getElementById('audit-body');

let pollTimer = null;

// Status chip factory
function makeChip(status) {
  const chip = document.createElement('span');
  chip.className = `status-chip chip-${status}`;
  chip.title = status;
  chip.textContent = { pending: '⏳', done: '✓', unreadable: '⚠', error: '✗' }[status] ?? status;
  return chip;
}

// Render the document list
function renderDocList(docs) {
  docList.innerHTML = '';
  if (!docs.length) {
    docList.innerHTML = '<div class="doc-empty">No documents yet.</div>';
    return;
  }
  const STATUS_LABELS = { done: 'Processed', pending: 'OCR Pending', error: 'Error', unreadable: 'Unreadable' };
  for (const doc of docs) {
    const item = document.createElement('div');
    item.className = 'doc-card' +
      (doc.ocr_status === 'pending' ? ' doc-card-pending' :
       doc.ocr_status === 'error'   ? ' doc-card-error'   : '');
    item.dataset.status = doc.ocr_status;

    const inner = document.createElement('div');
    inner.className = 'doc-card-inner';

    // File type icon
    const icon = document.createElement('span');
    icon.className = 'doc-card-icon';
    icon.textContent = doc.kind === 'pdf_typed' ? '📄' : '🖼️';
    inner.appendChild(icon);

    // Info: filename + status
    const info = document.createElement('div');
    info.className = 'doc-card-info';
    const fname = document.createElement('p');
    fname.className = 'doc-card-name';
    fname.textContent = doc.filename || doc.kind;
    fname.title = doc.filename || '';
    info.appendChild(fname);
    const statusRow = document.createElement('div');
    statusRow.className = 'doc-card-status-row';
    const dot = document.createElement('span');
    dot.className = `doc-card-dot doc-card-dot--${doc.ocr_status}`;
    const statusText = document.createElement('span');
    statusText.className = 'doc-card-status-text';
    statusText.textContent = STATUS_LABELS[doc.ocr_status] || doc.ocr_status;
    statusRow.appendChild(dot); statusRow.appendChild(statusText);
    info.appendChild(statusRow);
    inner.appendChild(info);

    // Re-upload affordance for failed docs
    if (doc.ocr_status === 'error' || doc.ocr_status === 'unreadable') {
      const reup = document.createElement('button');
      reup.className = 'doc-card-reupload';
      reup.title = 'Re-upload'; reup.textContent = '↑';
      reup.onclick = e => { e.stopPropagation(); fileInput.click(); };
      inner.appendChild(reup);
    }
    item.appendChild(inner);
    item.addEventListener('click', () => openAudit(doc.source_id));
    docList.appendChild(item);
  }
}

// Fetch doc list and update UI; start polling if any pending
async function refreshDocList() {
  if (!sessionId) return;
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents`);
    if (!res.ok) return;
    const docs = await res.json();
    renderDocList(docs);
    if (docs.some(d => d.ocr_status === 'pending')) startPolling();
  } catch (_) { /* silent */ }
}

// Re-extract hint: shown when a new document finishes OCR after a timeline
// already exists, so the user knows to re-extract and regenerate.
function showReextractHint() {
  if (document.getElementById('reextract-hint') || !_tlData) return;
  const hint = document.createElement('div');
  hint.id = 'reextract-hint';
  hint.className = 'reextract-hint';
  hint.innerHTML =
    '📄 New document processed — click <strong>Extract</strong> then ' +
    '<strong>Generate</strong> to fold it into the timeline.';
  docList.before(hint);
}

function clearReextractHint() {
  document.getElementById('reextract-hint')?.remove();
}

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    if (!sessionId) return;
    const res = await fetch(`/api/sessions/${sessionId}/documents`).catch(() => null);
    if (!res?.ok) return;
    const docs = await res.json();
    renderDocList(docs);
    if (!docs.some(d => d.ocr_status === 'pending')) {
      clearInterval(pollTimer);
      pollTimer = null;
      // If a timeline already exists, hint that re-extraction is needed
      showReextractHint();
    }
  }, 2000);
}

// Upload a single file
async function handleUpload(file) {
  if (!sessionId) { showToast('Start a session first.', true); return; }
  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents`, {
      method: 'POST', body: form,
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${res.status}`);
    }
    await refreshDocList();
    startPolling();
  } catch (err) {
    showToast(`Upload failed: ${err.message}`, true);
  }
}

// Audit modal
async function openAudit(sourceId) {
  try {
    const res = await fetch(`/api/sessions/${sessionId}/documents/${sourceId}`);
    if (!res.ok) return;
    const data = await res.json();

    auditTitle.textContent = data.filename || data.kind;
    auditBody.innerHTML = '';

    // Status row
    const statusRow = document.createElement('div');
    statusRow.className = 'audit-status-row';
    statusRow.innerHTML = `Status: <strong>${data.ocr_status}</strong>`;
    auditBody.appendChild(statusRow);

    // Warnings
    const warnings = data.extraction_meta?.warnings || [];
    if (warnings.length) {
      const warnBox = document.createElement('div');
      warnBox.className = 'audit-warnings';
      warnBox.innerHTML = warnings.map(w => `<div class="warn-item">⚠ ${w}</div>`).join('');
      auditBody.appendChild(warnBox);
    }

    // Extracted text
    if (data.extracted_text) {
      const t = document.createElement('div');
      t.className = 'audit-section-title';
      t.textContent = 'Extracted Text';
      auditBody.appendChild(t);
      const pre = document.createElement('pre');
      pre.className = 'audit-text';
      pre.textContent = data.extracted_text;
      auditBody.appendChild(pre);
    }

    // Structured meta (filtered — hide model/page_count/warnings already shown)
    const metaKeys = Object.keys(data.extraction_meta).filter(
      k => !['warnings', 'model', 'page_count'].includes(k)
    );
    if (metaKeys.length) {
      const mt = document.createElement('div');
      mt.className = 'audit-section-title';
      mt.textContent = 'Structured Fields';
      auditBody.appendChild(mt);
      const filtered = Object.fromEntries(metaKeys.map(k => [k, data.extraction_meta[k]]));
      const pre = document.createElement('pre');
      pre.className = 'audit-meta';
      pre.textContent = JSON.stringify(filtered, null, 2);
      auditBody.appendChild(pre);
    }

    auditModal.classList.remove('hidden');
  } catch (_) { /* silent */ }
}

function closeAudit() { auditModal.classList.add('hidden'); }
auditClose.addEventListener('click', closeAudit);
auditBackdrop.addEventListener('click', closeAudit);
